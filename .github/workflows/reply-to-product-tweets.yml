name: Reply to Product Tweets

on:
  schedule:
    - cron: '0 10,14,16 * * *'  # 3x daily: 10 AM, 2 PM, 4 PM UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Reply to product tweets
        id: reply
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/crawling/production/reply-to-product-tweets-sdk.js
          echo "reply_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet scripts/crawling/data/product-discovery-queue.json scripts/crawling/data/product-replies.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected"
          fi

      - name: Commit reply tracking
        if: steps.changes.outputs.has_changes == 'true' && steps.reply.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/crawling/data/product-discovery-queue.json
          git add scripts/crawling/data/product-replies.json
          git commit -m "Track product tweet replies

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push

      - name: Summary
        if: steps.reply.outcome == 'success'
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Successfully posted product educational threads"
          else
            echo "ℹ️  No suitable tweets found for reply"
          fi

  handle-failure:
    needs: reply
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date();
            const timestamp = now.toISOString();

            const issueBody = `## Product Tweet Reply Failure

            The product tweet reply workflow failed.

            - **Workflow Run:** [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Timestamp:** ${timestamp}

            ### Possible Causes

            1. **Twitter API Issues:**
               - Rate limit exceeded
               - Invalid/expired credentials
               - API endpoint changes
               - Tweet not found or deleted

            2. **Claude AI Issues:**
               - API key invalid
               - Rate limit exceeded
               - Response parsing errors

            3. **Script Issues:**
               - Thread generation errors
               - Character limit violations
               - Product isolation validation failed

            ### Action Required

            1. Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            2. Verify Twitter and Anthropic API credentials
            3. Check queue for problematic tweets
            4. Test script manually if needed

            ### Queue Status

            Check \`scripts/crawling/data/product-discovery-queue.json\` for current queue state.

            ---
            *Automated report from Product Tweet Reply workflow*`;

            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Product Tweet Reply Failure - ${now.toISOString().split('T')[0]}`,
                body: issueBody,
                labels: ['automated', 'product-reply', 'bug']
              });
              console.log(`Created issue #${issue.data.number}`);
            } catch (error) {
              console.error('Failed to create issue:', error.message);
            }
