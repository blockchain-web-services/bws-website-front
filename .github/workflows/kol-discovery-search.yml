name: KOL Discovery - Search Based

on:
  # TEMPORARILY DISABLED
  # schedule:
  #   - cron: '30 6 * * 1,3,5'  # Mon/Wed/Fri at 6:30 AM UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  discover-kols-by-search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install @blockchain-web-services/bws-x-sdk-node@1.7.0 @anthropic-ai/sdk

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run search-based KOL discovery with SDK
        id: discover
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CI: true
          GITHUB_ACTIONS: true
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "Starting search-based KOL discovery with BWS X SDK..."
          node scripts/crawling/production/discover-by-engagement-crawlee-sdk.js
          # Script exit code determines success (0 = success, 1 = failure)

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet scripts/crawling/data/kols-data.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠️  WARNING: No new KOLs discovered!"
            echo "This indicates the discovery process found no new accounts."
            echo "The workflow will fail to alert the team."
            exit 1
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ New KOLs discovered and added to database"
          fi

      - name: Get stats
        id: stats
        run: |
          if [ -f "scripts/crawling/data/kols-data.json" ]; then
            TOTAL=$(jq '.kols | length' scripts/crawling/data/kols-data.json)
            ACTIVE=$(jq '[.kols[] | select(.status == "active")] | length' scripts/crawling/data/kols-data.json)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/crawling/data/kols-data.json
          git commit -m "Search-based KOL discovery (SDK) - $(date +'%Y-%m-%d %H:%M UTC')

          Total: ${{ steps.stats.outputs.total }} | Active: ${{ steps.stats.outputs.active }}

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>"
          git push

      - name: Summary
        run: |
          echo "## 🔍 Search-Based Discovery Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date +'%H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Total KOLs:** ${{ steps.stats.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Active:** ${{ steps.stats.outputs.active }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New Additions:** ${{ steps.changes.outputs.has_changes == 'true' && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY
