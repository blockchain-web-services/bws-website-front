name: Claude Fix Success Handler

on:
  push:
    branches: [main, master]
  workflow_run:
    workflows: ["Build, Test, and Deploy to GitHub Pages"]
    types: [completed]

jobs:
  handle-claude-success:
    # Only run for automated CI fix attempts (not regular Claude commits)
    if: |
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, 'Claude-Fix-Attempt')) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       contains(github.event.workflow_run.head_commit.message, 'Claude-Fix-Attempt'))

    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Log Claude Fix Success
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW }}
          script: |
            console.log('Claude automated fix attempt detected');

            // Get commit info
            const commitSha = context.sha || context.payload.workflow_run?.head_sha;
            const commitMessage = context.payload.head_commit?.message ||
                                context.payload.workflow_run?.head_commit?.message || '';

            console.log(`Commit: ${commitSha.substring(0, 7)}`);
            console.log(`Message: ${commitMessage.split('\n')[0]}`);

            // Check recently closed issues to verify fix
            const recentlyClosedIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['single-test', 'automated'],
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 5
            });

            console.log(`Found ${recentlyClosedIssues.data.length} recently closed automated issues`);

            // Find if any were closed by this commit
            const fixedIssues = recentlyClosedIssues.data.filter(issue => {
              // Check if closed within last hour
              const closedAt = new Date(issue.closed_at).getTime();
              const oneHourAgo = Date.now() - (60 * 60 * 1000);
              return closedAt > oneHourAgo;
            });

            if (fixedIssues.length > 0) {
              console.log(`✅ Claude successfully fixed ${fixedIssues.length} issue(s):`);
              fixedIssues.forEach(issue => {
                console.log(`  - #${issue.number}: ${issue.title}`);
              });
            } else {
              console.log('ℹ️ No recently closed issues found - Claude may have already closed them');
            }

            // Log workflow completion
            console.log('Claude-Fix-Attempt workflow check completed');

      - name: Report success metrics
        if: success()
        run: |
          echo "Claude successfully fixed test failures!"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"