name: Claude Fix Success Handler

on:
  push:
    branches: [main, master]
  workflow_run:
    workflows: ["Build, Test, and Deploy to GitHub Pages"]
    types: [completed]

jobs:
  handle-claude-success:
    # Only run if the commit is from Claude and tests passed
    if: |
      (github.event_name == 'push' &&
       (contains(github.event.head_commit.message, 'Generated with Claude Code') ||
        contains(github.event.head_commit.message, 'Co-Authored-By: Claude') ||
        contains(github.event.head_commit.message, 'Claude-Fix-Attempt'))) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       (contains(github.event.workflow_run.head_commit.message, 'Generated with Claude Code') ||
        contains(github.event.workflow_run.head_commit.message, 'Claude-Fix-Attempt')))

    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Close Claude-fixed issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW }}
          script: |
            console.log('Claude fix detected, checking for issues to close...');

            // Get commit info
            const commitSha = context.sha || context.payload.workflow_run?.head_sha;
            const commitMessage = context.payload.head_commit?.message ||
                                context.payload.workflow_run?.head_commit?.message || '';

            // Find open test failure issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['test-failure', 'automated'],
              state: 'open'
            });

            console.log(`Found ${issues.data.length} open test failure issues`);

            // Look for issues that Claude was working on
            const claudeIssues = issues.data.filter(issue =>
              issue.body && (
                issue.body.includes('claude-fix-ci') ||
                issue.body.includes('@claude') ||
                issue.assignees?.some(a => a.login === 'claude')
              )
            );

            console.log(`Found ${claudeIssues.length} Claude-assigned issues`);

            // Close Claude's issues if this was a successful fix
            for (const issue of claudeIssues) {
              // Check if issue was created recently (within 24 hours)
              const issueAge = Date.now() - new Date(issue.created_at).getTime();
              const oneDayMs = 24 * 60 * 60 * 1000;

              if (issueAge < oneDayMs) {
                // Close the issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });

                // Add success comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ **Fixed by Claude!**

Tests are now passing after Claude's fix in commit ${commitSha.substring(0, 7)}.

**Commit Message:**
\`\`\`
${commitMessage}
\`\`\`

[View Successful Workflow Run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

Issue automatically closed by claude-success workflow.`
                });

                // Add label to indicate it was fixed by Claude
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['fixed-by-claude']
                });

                console.log(`Closed issue #${issue.number} as fixed by Claude`);
              }
            }

            // If no issues were closed but this was a Claude commit, log it
            if (claudeIssues.length === 0 && commitMessage.includes('Claude')) {
              console.log('Claude commit detected but no related issues found to close');
            }

      - name: Report success metrics
        if: success()
        run: |
          echo "Claude successfully fixed test failures!"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"