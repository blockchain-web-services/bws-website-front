name: Auto-Merge Copilot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run for Copilot bot PRs
    if: |
      github.event.pull_request &&
      (github.event.pull_request.user.login == 'copilot-swe-agent[bot]' ||
       github.event.pull_request.user.login == 'copilot[bot]' ||
       (github.event.pull_request.user.type == 'Bot' && contains(github.event.pull_request.user.login, 'copilot')))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get PR details
        id: pr-details
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const pr = context.payload.pull_request;

            console.log(`Processing PR #${prNumber} by ${pr.user.login}`);
            console.log(`PR state: ${pr.state}, Draft: ${pr.draft}`);

            // Check if PR is ready (not draft)
            if (pr.draft) {
              console.log('PR is still in draft mode, waiting for Copilot to finish');
              return;
            }

            core.setOutput('pr_number', prNumber);
            core.setOutput('is_ready', 'true');

            // Check PR size (optional safety check)
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const totalChanges = files.data.reduce((acc, file) => acc + file.changes, 0);
            console.log(`Total changes in PR: ${totalChanges}`);

            // Set a threshold for automatic merge (optional)
            const maxAutoMergeChanges = 1000; // Increased threshold since Copilot is trusted
            if (totalChanges > maxAutoMergeChanges) {
              console.log(`PR has ${totalChanges} changes, exceeding auto-merge threshold of ${maxAutoMergeChanges}`);
              core.setOutput('too_large', 'true');

              // Add a label for manual review
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['needs-manual-review', 'large-pr']
              });

              // Add comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '⚠️ **Manual Review Required**\n\nThis Copilot PR exceeds the automatic merge threshold of ' + maxAutoMergeChanges + ' changes.\nPlease review and merge manually.'
              });
            } else {
              core.setOutput('too_large', 'false');
            }

      - name: Wait for Copilot to finish
        if: steps.pr-details.outputs.is_ready != 'true'
        run: |
          echo "PR is not ready yet, Copilot is still working on it"
          exit 0

      - name: Auto-approve PR
        if: |
          steps.pr-details.outputs.is_ready == 'true' &&
          steps.pr-details.outputs.too_large != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.pr-details.outputs.pr_number }};

            try {
              // Check if PR is already approved
              const reviews = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });

              const approved = reviews.data.some(review =>
                review.state === 'APPROVED'
              );

              if (!approved) {
                // Approve the PR
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  event: 'APPROVE',
                  body: '✅ **Auto-approved Copilot PR**\n\nThis pull request was automatically approved because:\n- Created by GitHub Copilot coding agent\n- Copilot has finished its work (PR is ready for review)\n- Changes are within auto-merge threshold\n- No additional checks required for Copilot PRs'
                });
                console.log(`Approved PR #${prNumber}`);
              } else {
                console.log(`PR #${prNumber} is already approved`);
              }
            } catch (error) {
              console.log(`Could not approve PR: ${error.message}`);
              // Continue anyway, approval might not be required
            }

      - name: Merge PR immediately
        if: |
          steps.pr-details.outputs.is_ready == 'true' &&
          steps.pr-details.outputs.too_large != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.pr-details.outputs.pr_number }};

            try {
              // Add a comment before merging
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '🤖 **Auto-merging Copilot PR**\n\nMerging automatically without waiting for checks since this is a trusted Copilot PR.\n\nMerge method: Squash and merge'
              });

              // Directly merge the PR without waiting for checks
              const mergeResult = await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash', // or 'merge' or 'rebase' based on preference
                commit_title: `Merge Copilot PR #${prNumber}: ${context.payload.pull_request.title}`,
                commit_message: `Auto-merged by copilot-auto-merge workflow\n\nCopilot PR #${prNumber} was automatically merged without waiting for checks.`
              });

              if (mergeResult.data.merged) {
                console.log(`Successfully merged PR #${prNumber}`);

                // Try to delete the branch
                try {
                  const branch = context.payload.pull_request.head.ref;
                  if (!branch.startsWith('main') && !branch.startsWith('master')) {
                    await github.rest.git.deleteRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `heads/${branch}`
                    });
                    console.log(`Deleted branch ${branch}`);
                  }
                } catch (deleteError) {
                  console.log(`Could not delete branch: ${deleteError.message}`);
                }
              }
            } catch (error) {
              console.log(`Could not merge PR: ${error.message}`);

              // If merge fails, try enabling auto-merge as fallback
              try {
                console.log('Attempting to enable auto-merge as fallback...');

                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });

                const mutation = `
                  mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $pullRequestId,
                      mergeMethod: $mergeMethod
                    }) {
                      pullRequest {
                        autoMergeRequest {
                          enabledAt
                          mergeMethod
                        }
                      }
                    }
                  }
                `;

                await github.graphql(mutation, {
                  pullRequestId: pr.data.node_id,
                  mergeMethod: 'SQUASH'
                });

                console.log(`Enabled auto-merge for PR #${prNumber} as fallback`);

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: '⚠️ **Auto-merge enabled as fallback**\n\nDirect merge failed (likely due to branch protection rules).\nAuto-merge has been enabled and will complete when requirements are met.'
                });
              } catch (autoMergeError) {
                console.log(`Auto-merge fallback also failed: ${autoMergeError.message}`);

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: '❌ **Auto-merge failed**\n\nCould not automatically merge this PR. Please merge manually.\n\nError: ' + error.message
                });
              }
            }

      - name: Add status labels
        if: steps.pr-details.outputs.pr_number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.pr-details.outputs.pr_number }};

            const labels = ['copilot-pr'];

            if ('${{ steps.pr-details.outputs.too_large }}' === 'true') {
              labels.push('needs-manual-review', 'large-pr');
            } else if ('${{ steps.pr-details.outputs.is_ready }}' === 'true') {
              labels.push('auto-merged');
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: labels
              });
            } catch (error) {
              console.log(`Could not add labels: ${error.message}`);
            }