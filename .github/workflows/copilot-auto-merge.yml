name: Auto-Merge Copilot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["Build, Test, and Deploy to GitHub Pages"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run for Copilot bot PRs
    if: |
      (github.event.pull_request &&
       (github.event.pull_request.user.login == 'copilot-swe-agent[bot]' ||
        github.event.pull_request.user.login == 'copilot[bot]' ||
        github.event.pull_request.user.type == 'Bot' && contains(github.event.pull_request.user.login, 'copilot'))) ||
      (github.event.workflow_run &&
       github.event.workflow_run.head_branch != 'main' &&
       github.event.workflow_run.head_branch != 'master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get PR details
        id: pr-details
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            // Get the PR number from different event types
            let prNumber;

            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.workflow_run) {
              // Find PRs associated with the workflow run
              const pulls = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
              });

              if (pulls.data.length > 0) {
                prNumber = pulls.data[0].number;
              }
            }

            if (!prNumber) {
              console.log('No PR found for auto-merge');
              return;
            }

            // Get PR details
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            console.log(`Processing PR #${prNumber} by ${pr.data.user.login}`);

            // Check if it's a Copilot PR
            const isCopilotPR = pr.data.user.login === 'copilot-swe-agent[bot]' ||
                               pr.data.user.login === 'copilot[bot]' ||
                               (pr.data.user.type === 'Bot' && pr.data.user.login.includes('copilot'));

            if (!isCopilotPR) {
              console.log('Not a Copilot PR, skipping auto-merge');
              return;
            }

            core.setOutput('pr_number', prNumber);
            core.setOutput('is_copilot', 'true');

            // Check PR size (optional safety check)
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const totalChanges = files.data.reduce((acc, file) => acc + file.changes, 0);
            console.log(`Total changes in PR: ${totalChanges}`);

            // Set a threshold for automatic merge (optional)
            const maxAutoMergeChanges = 500; // Adjust as needed
            if (totalChanges > maxAutoMergeChanges) {
              console.log(`PR has ${totalChanges} changes, exceeding auto-merge threshold of ${maxAutoMergeChanges}`);
              core.setOutput('too_large', 'true');

              // Add a label for manual review
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['needs-manual-review', 'large-pr']
              });
            } else {
              core.setOutput('too_large', 'false');
            }

      - name: Wait for checks to complete
        if: steps.pr-details.outputs.is_copilot == 'true' && steps.pr-details.outputs.too_large != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.pr-details.outputs.pr_number }};
            if (!prNumber) return;

            // Wait for checks to complete (max 10 minutes)
            const maxWaitTime = 10 * 60 * 1000; // 10 minutes
            const checkInterval = 30 * 1000; // 30 seconds
            const startTime = Date.now();

            while (Date.now() - startTime < maxWaitTime) {
              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request ? context.payload.pull_request.head.sha : context.payload.workflow_run.head_sha
              });

              const pending = checks.data.check_runs.filter(check =>
                check.status !== 'completed' &&
                check.name !== 'Auto-Merge Copilot PRs' // Don't wait for ourselves
              );

              if (pending.length === 0) {
                console.log('All checks completed');

                // Check if all required checks passed
                const failed = checks.data.check_runs.filter(check =>
                  check.conclusion === 'failure' ||
                  check.conclusion === 'cancelled'
                );

                if (failed.length > 0) {
                  console.log(`${failed.length} checks failed, cannot auto-merge`);
                  core.setOutput('checks_passed', 'false');
                  return;
                }

                core.setOutput('checks_passed', 'true');
                break;
              }

              console.log(`Waiting for ${pending.length} checks to complete...`);
              await new Promise(resolve => setTimeout(resolve, checkInterval));
            }

      - name: Auto-approve PR
        if: |
          steps.pr-details.outputs.is_copilot == 'true' &&
          steps.pr-details.outputs.too_large != 'true' &&
          steps.pr-details.outputs.checks_passed != 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.pr-details.outputs.pr_number }};
            if (!prNumber) return;

            try {
              // Check if PR is already approved
              const reviews = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });

              const approved = reviews.data.some(review =>
                review.state === 'APPROVED'
              );

              if (!approved) {
                // Approve the PR
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  event: 'APPROVE',
                  body: '✅ Auto-approved Copilot PR\n\nThis pull request was automatically approved because:\n- It was created by GitHub Copilot\n- All required checks passed\n- Changes are within auto-merge threshold'
                });
                console.log(`Approved PR #${prNumber}`);
              } else {
                console.log(`PR #${prNumber} is already approved`);
              }
            } catch (error) {
              console.log(`Could not approve PR: ${error.message}`);
            }

      - name: Enable auto-merge
        if: |
          steps.pr-details.outputs.is_copilot == 'true' &&
          steps.pr-details.outputs.too_large != 'true' &&
          steps.pr-details.outputs.checks_passed != 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.pr-details.outputs.pr_number }};
            if (!prNumber) return;

            try {
              // Get PR details for merge method
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });

              // Enable auto-merge using GraphQL
              const mutation = `
                mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: $mergeMethod
                  }) {
                    pullRequest {
                      autoMergeRequest {
                        enabledAt
                        mergeMethod
                      }
                    }
                  }
                }
              `;

              await github.graphql(mutation, {
                pullRequestId: pr.data.node_id,
                mergeMethod: 'SQUASH' // or 'MERGE' or 'REBASE' based on your preference
              });

              console.log(`Enabled auto-merge for PR #${prNumber}`);

              // Add a comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '🤖 **Auto-merge enabled**\n\nThis Copilot PR will be automatically merged once all requirements are met:\n- ✅ All checks passed\n- ✅ PR approved\n- ✅ Branch is up to date\n\nThe PR will be squash-merged to maintain a clean commit history.'
              });

            } catch (error) {
              console.log(`Could not enable auto-merge: ${error.message}`);

              // Try alternative approach using GitHub CLI if available
              try {
                const { execSync } = require('child_process');
                execSync(`gh pr merge ${prNumber} --auto --squash --delete-branch`, {
                  env: { ...process.env, GITHUB_TOKEN: '${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}' }
                });
                console.log(`Enabled auto-merge using GitHub CLI for PR #${prNumber}`);
              } catch (cliError) {
                console.log(`GitHub CLI also failed: ${cliError.message}`);
              }
            }

      - name: Add status labels
        if: steps.pr-details.outputs.pr_number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.pr-details.outputs.pr_number }};
            if (!prNumber) return;

            const labels = ['copilot-pr'];

            if (steps.pr-details.outputs.too_large === 'true') {
              labels.push('needs-manual-review');
            } else if (steps.pr-details.outputs.checks_passed === 'true') {
              labels.push('auto-merge-enabled');
            }

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: labels
              });
            } catch (error) {
              console.log(`Could not add labels: ${error.message}`);
            }