name: Weekly X Post

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 14:00 UTC (10am ET / 9am CT)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but do not post to X)'
        required: false
        type: boolean
        default: false
      test_simple:
        description: 'Test with simple message (no full post)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  NODE_VERSION: "20"

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install project dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Install script dependencies
        run: npm install @octokit/rest dotenv twitter-api-v2 @anthropic-ai/sdk

      - name: Generate and post weekly X update
        id: post
        env:
          PAT_GITHUB_ACTIONS: ${{ secrets.PAT_GITHUB_ACTIONS }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAT_REPOS_AND_WORKFLOW: ${{ secrets.PAT_REPOS_AND_WORKFLOW }}
          DRY_RUN: ${{ inputs.dry_run }}
          TEST_SIMPLE: ${{ inputs.test_simple }}
        run: |
          node scripts/crawling/production/generate-weekly-x-post.js
          echo "post_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit state file if changed
        if: steps.post.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/crawling/production/data/weekly-x-posts-state.json
          if git diff --staged --quiet; then
            echo "ℹ️  No state changes to commit"
          else
            git commit -m "$(cat <<'EOF'
          Update weekly X post state

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>
          EOF
          )"
            git push
          fi

      - name: Summary
        if: steps.post.outcome == 'success'
        run: echo "✅ Weekly X post workflow completed"

  # Job 2: Handle failures - create fix branch and PR
  handle-failure:
    needs: generate-and-post
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create fix branch and PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const now = new Date();
            const timestamp = now.toISOString().replace(/[:.]/g, '-').substring(0, 19);
            const shortSha = context.sha.substring(0, 7);
            const branchName = `fix/weekly-x-post-failure-${timestamp}-${shortSha}`;

            console.log(`Creating fix branch: ${branchName}`);

            // Configure git
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');

            // Create and checkout new branch
            execSync(`git checkout -b ${branchName}`);

            // Create fixes directory
            const fixesDir = `fixes/${branchName.replace(/\//g, '-')}`;
            execSync(`mkdir -p ${fixesDir}`);

            // Create failure report
            const failureReport = [
              '# Weekly X Post Failure Report',
              '',
              `**Generated:** ${now.toISOString()}`,
              `**Workflow Run:** [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              `**Commit:** ${context.sha}`,
              `**Branch:** ${context.ref.replace('refs/heads/', '')}`,
              '',
              '## Issue Description',
              '',
              'The weekly X post workflow failed.',
              '',
              '## Possible Causes',
              '',
              '1. **GitHub API Issues:**',
              '   - Rate limit exceeded',
              '   - Token permissions insufficient',
              '   - Repository or branch not found',
              '',
              '2. **Twitter API Issues:**',
              '   - Invalid OAuth credentials',
              '   - Rate limit exceeded',
              '   - Account suspended',
              '   - Wrong account authenticated',
              '',
              '3. **Anthropic API Issues:**',
              '   - Invalid API key',
              '   - Rate limit exceeded',
              '   - Model errors or timeouts',
              '',
              '4. **Script Issues:**',
              '   - Repo configuration errors',
              '   - State file corruption',
              '   - Network timeout',
              '',
              '## Action Required',
              '',
              `1. Check [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              '2. Verify secrets:',
              '   - PAT_GITHUB_ACTIONS (for cross-repo access)',
              '   - TWITTER_API_KEY',
              '   - TWITTER_API_SECRET',
              '   - TWITTER_ACCESS_TOKEN',
              '   - TWITTER_ACCESS_SECRET',
              '   - ANTHROPIC_API_KEY',
              '3. Test locally: `DRY_RUN=true node scripts/crawling/production/generate-weekly-x-post.js`',
              '4. Fix and push to this branch',
              '',
              '---',
              '*This is an automated report from the weekly X post workflow.*'
            ].join('\n');

            fs.writeFileSync(`${fixesDir}/FAILURE_REPORT.md`, failureReport);

            // Commit and push
            execSync(`git add ${fixesDir}`);
            execSync(`git commit -m "Add weekly X post failure report\n\nFailure detected in workflow run ${{ github.run_id }}"`);
            execSync(`git push -u origin ${branchName}`);

            console.log('Branch created and pushed successfully');

            // Create pull request
            try {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔧 Fix: Weekly X post failure - ${timestamp}`,
                head: branchName,
                base: context.ref.replace('refs/heads/', ''),
                body: `## 🔴 Weekly X Post Workflow Failure\n\nAutomated fix branch created due to weekly X post workflow failure.\n\n### 📋 Details\n- **Failed Workflow:** [Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n- **Failed Commit:** ${context.sha}\n- **Branch:** \`${branchName}\`\n- **Failure Report:** [FAILURE_REPORT.md](https://github.com/${{ github.repository }}/blob/${branchName}/${fixesDir}/FAILURE_REPORT.md)\n- **Timestamp:** ${now.toISOString()}\n\n### 🔄 Workflow\n1. Review failure report and workflow logs\n2. Investigate root cause\n3. Fix the issue (update credentials, fix script, etc.)\n4. Push fixes to this branch\n5. Workflow will re-run automatically\n\n---\n*Generated by GitHub Actions*`,
                draft: false
              });

              console.log(`Created PR #${pr.data.number}`);

              // Add labels
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.data.number,
                labels: ['automated', 'weekly-x-post', 'needs-fix']
              });

              console.log('Labels added to PR');

            } catch (error) {
              console.error('Failed to create PR:', error.message);
            }

            // Create issue for tracking
            const issueBody = `## Weekly X Post Failure\n\nThe weekly X post workflow failed.\n\n- **Fix Branch:** \`${branchName}\`\n- **Pull Request:** Created automatically\n- **Workflow Run:** [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n- **Timestamp:** ${now.toISOString()}\n\n### Action Required\nReview the failure report in the PR and fix the issue.\n\nThe workflow will retry daily at 14:00 UTC automatically.\n\n### Quick Checks\n- [ ] Verify PAT_GITHUB_ACTIONS secret (for cross-repo access)\n- [ ] Verify Twitter OAuth credentials\n- [ ] Verify Anthropic API key\n- [ ] Check API rate limits\n- [ ] Review workflow logs for errors\n- [ ] Test script locally`;

            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Weekly X Post Failure - ${timestamp}`,
                body: issueBody,
                labels: ['weekly-x-post', 'automated', 'bug']
              });
              console.log(`Created issue #${issue.data.number}`);
            } catch (error) {
              console.error('Failed to create issue:', error.message);
            }

