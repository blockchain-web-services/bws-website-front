name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to rollback to (leave empty for previous deployment)'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://www.bws.ninja
    steps:
      - name: Determine rollback target
        id: target
        run: |
          if [ -n "${{ inputs.commit_sha }}" ]; then
            echo "commit=${{ inputs.commit_sha }}" >> $GITHUB_OUTPUT
            echo "Rollback target: ${{ inputs.commit_sha }}"
          else
            # Get the previous successful deployment commit
            echo "commit=HEAD~1" >> $GITHUB_OUTPUT
            echo "Rolling back to previous commit"
          fi

      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.commit }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: |
          npm run build
          echo "ROLLBACK: ${{ steps.target.outputs.commit }}" > _site/deployment-sha.txt
          echo "Rollback timestamp: $(date)" >> _site/deployment-sha.txt
        env:
          NODE_ENV: production

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Rollback to ${{ steps.target.outputs.commit }}'
          cname: www.bws.ninja

      - name: Wait for deployment
        run: sleep 30

      - name: Verify rollback
        run: |
          echo "Verifying rollback deployment..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://www.bws.ninja/)
          echo "Site status: $response"

          if [ "$response" = "200" ]; then
            echo "✅ Rollback successful!"
          else
            echo "⚠️ Site may not be fully deployed yet"
          fi

      - name: Create rollback issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 Rollback completed to ${context.payload.inputs.commit_sha || 'previous commit'}`,
              body: `## Rollback Summary

              - **Rolled back to:** ${{ steps.target.outputs.commit }}
              - **Triggered by:** @${{ github.actor }}
              - **Timestamp:** ${new Date().toISOString()}
              - **Site URL:** https://www.bws.ninja

              ### Next Steps
              1. Investigate the issue that caused the rollback
              2. Fix the issue in a new branch
              3. Test thoroughly before merging
              4. Deploy the fix

              [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              labels: ['rollback', 'deployment']
            });