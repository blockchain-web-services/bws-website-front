name: KOL Timeline Monitoring

on:
  schedule:
    - cron: '15 7 * * *'    # 07:15 UTC - Morning run
    - cron: '30 12 * * *'   # 12:30 UTC - Midday run
    - cron: '45 17 * * *'   # 17:45 UTC - Afternoon run
    - cron: '0 22 * * *'    # 22:00 UTC - Evening run
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  monitor-timelines:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # HTML parsing can take time with multiple KOLs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install @blockchain-web-services/bws-x-sdk-node@1.6.0 @anthropic-ai/sdk

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run KOL timeline monitoring
        id: monitor
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAT_REPOS_AND_WORKFLOW: ${{ secrets.PAT_REPOS_AND_WORKFLOW }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
          CI: true
          GITHUB_ACTIONS: true
        run: |
          echo "Starting KOL timeline monitoring (Script 2.2.1 - SDK version)..."
          node scripts/crawling/production/monitor-kol-timelines-sdk.js
          echo "monitor_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet scripts/crawling/data/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Get stats
        id: stats
        run: |
          if [ -f "scripts/crawling/data/engaging-posts.json" ]; then
            TOTAL_POSTS=$(jq '.posts | length' scripts/crawling/data/engaging-posts.json)
            UNPROCESSED=$(jq '[.posts[] | select(.processed == false)] | length' scripts/crawling/data/engaging-posts.json)
            echo "total=$TOTAL_POSTS" >> $GITHUB_OUTPUT
            echo "unprocessed=$UNPROCESSED" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "unprocessed=0" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/crawling/data/
          git commit -m "KOL timeline monitoring - $(date +'%Y-%m-%d %H:%M UTC')

          Total posts: ${{ steps.stats.outputs.total }} | Unprocessed: ${{ steps.stats.outputs.unprocessed }}

          🤖 Generated with [Claude Code](https://claude.com/claude-code)"
          git push

      - name: Summary
        run: |
          echo "## 🔍 Timeline Monitoring Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date +'%H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Posts in Queue:** ${{ steps.stats.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Unprocessed Posts:** ${{ steps.stats.outputs.unprocessed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New Posts Added:** ${{ steps.changes.outputs.has_changes == 'true' && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY
