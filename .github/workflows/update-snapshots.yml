name: Update Visual Snapshots

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'public/**'
      - 'tests/visual/snapshots.spec.js'
  workflow_dispatch:  # Allow manual trigger
  schedule:
    # Run weekly on Sundays at 2 AM UTC to keep snapshots fresh
    - cron: '0 2 * * 0'

permissions:
  contents: write

jobs:
  generate-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Install test dependencies
        run: |
          cd tests
          npm ci

      - name: Install Playwright browsers
        run: |
          cd tests
          npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Start preview server
        run: |
          cd tests
          npm run preview:sirv &
          sleep 5

      - name: Run snapshot tests
        run: |
          cd tests
          npx playwright test visual/snapshots.spec.js --config=playwright.config.cjs
        env:
          CI: true
          NO_WEBSERVER: true

      - name: Check for changes
        id: check_changes
        run: |
          git add docs/screenshots/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in snapshots"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in snapshots"
          fi

      - name: Commit and push snapshots
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Get current date for commit message
          CURRENT_DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          git commit -m "Update visual snapshots - $CURRENT_DATE

          Auto-generated by GitHub Actions workflow.

          Triggered by: ${{ github.event_name }}
          Commit: ${{ github.sha }}"

          git push

      - name: Upload snapshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: docs/screenshots/
          retention-days: 30

      - name: Comment on commit (if triggered by push)
        if: github.event_name == 'push' && steps.check_changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const commitSha = context.sha;
            const message = `✨ Visual snapshots have been updated for this commit.\n\nView the updated snapshots in [docs/VISUALS.md](https://github.com/${{ github.repository }}/blob/master/docs/VISUALS.md)`;

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha,
              body: message
            });

      - name: Summary
        if: always()
        run: |
          echo "## Visual Snapshots Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes Detected**: ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View snapshots: [docs/VISUALS.md](https://github.com/${{ github.repository }}/blob/master/docs/VISUALS.md)" >> $GITHUB_STEP_SUMMARY
