name: Main Branch Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # Job 1: Run test suite
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium]
    name: Test - ${{ matrix.browser }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            package.json
            tests/package.json

      - name: Install build dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Clean any cached build artifacts
        run: |
          echo "Removing any cached _site directory..."
          rm -rf _site
          echo "Removing any cached .astro directory..."
          rm -rf .astro
          echo "✅ Cache cleared"

      - name: Build site
        run: npm run build

      - name: Verify build includes fixes
        run: |
          echo "═══════════════════════════════════════════════════════════════════"
          echo "BUILD VERIFICATION"
          echo "═══════════════════════════════════════════════════════════════════"

          echo "1. Checking _site directory structure..."
          if [ -d "_site" ]; then
            echo "✅ _site directory exists"
            echo "   Contents:"
            ls -lh _site/ | head -20

            echo ""
            echo "2. Checking critical files..."
            [ -f "_site/styles.css" ] && echo "   ✅ styles.css exists ($(wc -l < _site/styles.css) lines)" || echo "   ❌ styles.css MISSING"
            [ -f "_site/index.html" ] && echo "   ✅ index.html exists ($(wc -l < _site/index.html) lines)" || echo "   ❌ index.html MISSING"

            echo ""
            echo "3. Verifying CSS logo sizing is correct..."
            if [ -f "_site/styles.css" ]; then
              echo "   Checking AssureDefi CSS (should be height: 120px)..."
              if grep -q "html body .announcement-flex-logos img.image-assure" _site/styles.css; then
                grep -A 3 "html body .announcement-flex-logos img.image-assure" _site/styles.css | head -4
                if grep -A 3 "html body .announcement-flex-logos img.image-assure" _site/styles.css | grep -q "height: 120px"; then
                  echo "   ✅ AssureDefi CSS correct (height: 120px)"
                else
                  echo "   ❌ AssureDefi CSS WRONG - not 120px height!"
                  exit 1
                fi
              else
                echo "   ❌ AssureDefi CSS selector not found!"
                exit 1
              fi

              echo "   Checking PROOF CSS (should be width: 150px)..."
              if grep -q "html body .announcement-flex-logos img.image-proof" _site/styles.css; then
                grep -A 3 "html body .announcement-flex-logos img.image-proof" _site/styles.css | head -4
                if grep -A 3 "html body .announcement-flex-logos img.image-proof" _site/styles.css | grep -q "width: 150px"; then
                  echo "   ✅ PROOF CSS correct (width: 150px)"
                else
                  echo "   ❌ PROOF CSS WRONG - not 150px width!"
                  exit 1
                fi
              else
                echo "   ❌ PROOF CSS selector not found!"
                exit 1
              fi
            fi

            echo ""
            echo "4. Checking assets directory..."
            if [ -d "_site/assets/images" ]; then
              echo "   ✅ assets/images directory exists"
              echo "   Image count: $(find _site/assets/images -type f | wc -l) files"
            else
              echo "   ❌ assets/images directory MISSING"
            fi
          else
            echo "❌ ERROR: _site directory does not exist!"
          fi

          echo ""
          echo "═══════════════════════════════════════════════════════════════════"

      - name: Install test dependencies
        working-directory: tests
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start preview server and verify CSS
        working-directory: tests
        run: |
          echo "Starting preview server..."
          npm run preview:sirv &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait for server to start
          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:4321/ > /dev/null 2>&1; then
              echo "✅ Server is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Server failed to start"
              kill $SERVER_PID || true
              exit 1
            fi
            sleep 1
          done

          # Verify CSS is being served with correct content
          echo ""
          echo "Verifying CSS is served correctly..."
          if curl -s http://localhost:4321/styles.css | grep -q "height: 120px"; then
            echo "✅ AssureDefi CSS (height: 120px) found in served styles.css"
          else
            echo "❌ AssureDefi CSS NOT FOUND in served styles.css!"
            echo "First few occurrences of 'image-assure':"
            curl -s http://localhost:4321/styles.css | grep -A 3 "image-assure" | head -20
            kill $SERVER_PID || true
            exit 1
          fi

          if curl -s http://localhost:4321/styles.css | grep -q "width: 150px"; then
            echo "✅ PROOF CSS (width: 150px) found in served styles.css"
          else
            echo "❌ PROOF CSS NOT FOUND in served styles.css!"
            kill $SERVER_PID || true
            exit 1
          fi

          # Stop the server - tests will start their own
          kill $SERVER_PID || true
          sleep 2
          echo "✅ CSS verification complete"

      - name: Run Playwright tests
        id: test-run
        working-directory: tests
        env:
          PORT: 4321
          PLAYWRIGHT_BASE_URL: http://localhost:4321
          CI: true
          DEBUG: pw:browser
        run: |
          echo "Starting Playwright tests..."
          echo "Environment:"
          echo "  BASE_URL: $PLAYWRIGHT_BASE_URL"
          echo "  CI: $CI"
          echo "  Browser: ${{ matrix.browser }}"

          # Run tests and capture output with ANSI color codes
          # Note: Reporters are configured in playwright.config.cjs (json with outputFile, list, line)
          # Run ALL tests (chromium + smoke + e2e) for complete pre-deployment validation
          npx playwright test --config=playwright.config.cjs 2>&1 | tee test-output-raw.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          # Strip ANSI escape codes and create clean output
          if [ -f "test-output-raw.txt" ]; then
            # Remove ANSI color codes and control sequences
            sed -E 's/\x1B\[[0-9;]*[mGKH]//g' test-output-raw.txt | sed -E 's/\[([0-9]+)m//g' > test-output-full.txt

            # Create a filtered version for the report without failureSummary noise
            # CRITICAL: Include WCAG violation patterns to preserve console.log output from accessibility tests
            grep -E "(✓|✗|✘|×|FAIL|fail|Error|error|expected|received|Test timeout|\s+at\s+|Running|\d+\)|test-results/|===.*Violations.*===|^\s*[0-9]+\.|Impact:|Description:|Affected nodes:|Fix:|\s+-\s+Node)" test-output-full.txt | grep -v "failureSummary" > test-output.txt 2>/dev/null || cp test-output-full.txt test-output.txt
          fi

          echo "Test exit code: ${TEST_EXIT_CODE}"

          if [ ${TEST_EXIT_CODE} -eq 0 ]; then
            echo "✅ All tests passed!"
            echo "tests_passed=true" >> $GITHUB_OUTPUT
            echo "Output set: tests_passed=true"
          else
            echo "❌ Tests failed with exit code ${TEST_EXIT_CODE}"
            echo "tests_passed=false" >> $GITHUB_OUTPUT
            echo "Output set: tests_passed=false"
          fi

          # Show test summary if available
          echo "Looking for test results file..."
          ls -la test-results* 2>/dev/null || echo "No test-results files found"

          if [ -f "test-results.json" ]; then
            echo "Test results summary:"
            jq -r '.stats | "Total: \(.expected), Passed: \(.passed), Failed: \(.failed), Skipped: \(.skipped // 0)"' test-results.json 2>/dev/null || echo "Could not parse test results"
          else
            echo "test-results.json not found in $(pwd)"
          fi

          # Store the actual exit code for the workflow
          echo "test_exit_code=${TEST_EXIT_CODE}" >> $GITHUB_OUTPUT

          # Exit with actual code to fail the job if tests failed
          exit ${TEST_EXIT_CODE}

      - name: Collect test failures
        if: failure()
        working-directory: tests
        run: |
          echo "Collecting test errors..."

          # Generate DD-MM-HH timestamp
          DD=$(date -u '+%d')
          MM=$(date -u '+%m')
          HH=$(date -u '+%H')
          TIMESTAMP="${DD}-${MM}-${HH}"

          # Create BRANCH_ISSUES.md in root for later processing
          ISSUES_FILE="../BRANCH_ISSUES.md"

          echo "# Test Failure Report" > "$ISSUES_FILE"
          echo "" >> "$ISSUES_FILE"
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$ISSUES_FILE"
          echo "**Workflow Run:** [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$ISSUES_FILE"
          echo "**Commit:** ${{ github.sha }}" >> "$ISSUES_FILE"
          echo "**Branch:** ${{ github.ref_name }}" >> "$ISSUES_FILE"
          echo "" >> "$ISSUES_FILE"

          echo "## Test Results Summary" >> "$ISSUES_FILE"

          if [ -f "test-results.json" ]; then
            echo "Processing test results..." >> "$ISSUES_FILE"
            # Extract test failure details using jq if available
            if command -v jq >/dev/null 2>&1; then
              echo "### Statistics" >> "$ISSUES_FILE"
              jq -r '.stats | "- **Total Tests:** \(.expected)\n- **Passed:** ✅ \(.passed)\n- **Failed:** ❌ \(.failed)\n- **Duration:** \(.duration)ms"' test-results.json >> "$ISSUES_FILE" || echo "Could not extract stats" >> "$ISSUES_FILE"
              echo "" >> "$ISSUES_FILE"

              echo "### Failed Tests" >> "$ISSUES_FILE"
              jq -r '.suites[] | select(.specs[].tests[].status == "failed") | .specs[] | select(.tests[].status == "failed") | "- **\(.title)**"' test-results.json >> "$ISSUES_FILE" 2>/dev/null || echo "Could not extract test details" >> "$ISSUES_FILE"
            fi
          fi

          echo "" >> "$ISSUES_FILE"
          echo "## Test Output Extract" >> "$ISSUES_FILE"
          echo '```' >> "$ISSUES_FILE"
          grep -E "✗|✘|FAILED|Error:" test-output.txt | head -50 >> "$ISSUES_FILE" 2>/dev/null || echo "No specific failures found" >> "$ISSUES_FILE"
          echo '```' >> "$ISSUES_FILE"

          echo "✅ Created BRANCH_ISSUES.md with test failure details"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-report
          path: |
            BRANCH_ISSUES.md
            tests/test-output.txt
          if-no-files-found: warn
          retention-days: 7

  # Job 2: Handle test failures - create fix branch and PR
  handle-test-failure:
    needs: test
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Download test failure report
        uses: actions/download-artifact@v4
        with:
          name: test-failure-report

      - name: Create fix branch and PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Generate timestamp
            const now = new Date();
            const dd = String(now.getUTCDate()).padStart(2, '0');
            const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
            const hh = String(now.getUTCHours()).padStart(2, '0');
            const timestamp = `${dd}-${mm}-${hh}`;
            const fullTimestamp = now.toISOString().replace(/[:.]/g, '-').substring(0, 19);
            const shortSha = context.sha.substring(0, 7);

            // Create branch name
            const branchName = `fix/test-failures-${fullTimestamp}-${shortSha}`;
            console.log(`Creating fix branch: ${branchName}`);

            // Configure git
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');

            // Set up authentication
            const token = '${{ secrets.PAT_REPOS_AND_WORKFLOW || secrets.GITHUB_TOKEN }}';
            const remoteUrl = `https://x-access-token:${token}@github.com/${{ github.repository }}.git`;
            execSync(`git remote set-url origin ${remoteUrl}`);

            // Create and checkout new branch
            execSync(`git checkout -b ${branchName}`);

            // Create fixes directory structure
            const fixesDir = `fixes/${branchName.replace(/\//g, '-')}`;
            execSync(`mkdir -p ${fixesDir}`);

            // Move BRANCH_ISSUES.md to fixes folder
            if (fs.existsSync('BRANCH_ISSUES.md')) {
              execSync(`mv BRANCH_ISSUES.md ${fixesDir}/BRANCH_ISSUES.md`);
              console.log(`Moved BRANCH_ISSUES.md to ${fixesDir}/`);
            } else {
              // Create a minimal report if not found
              const content = `# Test Failure Report\n\nGenerated: ${now.toISOString()}\n\nSee workflow run for details.`;
              fs.writeFileSync(`${fixesDir}/BRANCH_ISSUES.md`, content);
            }

            // Commit and push
            execSync(`git add ${fixesDir}`);
            execSync(`git commit -m "Add test failure report from main branch\n\nTest failures detected on ${context.sha}"`);
            execSync(`git push -u origin ${branchName}`);

            console.log('Branch created and pushed successfully');

            // Create pull request
            try {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔧 Fix: Test failures from main - ${timestamp}`,
                head: branchName,
                base: context.ref.replace('refs/heads/', ''),
                body: `## 🔴 Test Failures Detected on Main Branch\n\nAutomated fix branch created due to test failures.\n\n### 📋 Details\n- **Failed Commit:** ${context.sha}\n- **Branch:** ${branchName}\n- **Test Report:** [BRANCH_ISSUES.md](https://github.com/${{ github.repository }}/blob/${branchName}/${fixesDir}/BRANCH_ISSUES.md)\n\n### 🔄 Workflow\n1. Review test failures in BRANCH_ISSUES.md\n2. Fix the failing tests\n3. Push fixes to this branch\n4. Tests will re-run automatically\n5. PR will auto-merge when all tests pass ✅\n\n### 🤖 Auto-Merge\nThis PR is configured to auto-merge once all tests pass.\n\n---\n*Generated by GitHub Actions*`,
                draft: false
              });

              console.log(`Created PR #${pr.data.number}`);

              // Add labels
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.data.number,
                labels: ['test-fix', 'automated', 'tests-failing']
              });

              // Output PR info for other jobs
              core.setOutput('pr_number', pr.data.number);
              core.setOutput('pr_url', pr.data.html_url);

            } catch (error) {
              console.error('Failed to create PR:', error.message);
            }

            // Create issue for tracking
            const issueBody = `## Test Failures on Main Branch\n\nTest failures were detected and a fix branch has been created.\n\n- **Fix Branch:** ${branchName}\n- **Pull Request:** Created automatically\n- **Action Required:** Review and fix failing tests\n\nThe PR will auto-merge once tests pass.`;

            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Test Failures - ${timestamp}`,
                body: issueBody,
                labels: ['test-failure', 'automated']
              });
              console.log(`Created issue #${issue.data.number}`);
            } catch (error) {
              console.error('Failed to create issue:', error.message);
            }

  # Job 3: Build and deploy when tests pass
  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build production site
        run: |
          npm run build
          echo "${{ github.sha }}" > _site/deployment-sha.txt
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: _site/
          retention-days: 1

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy ${{ github.sha }} to GitHub Pages"
          cname: www.bws.ninja

  # Job 4: Post-deployment validation
  validate-deployment:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests on production
        working-directory: tests
        env:
          PLAYWRIGHT_BASE_URL: "https://www.bws.ninja"
          NO_WEBSERVER: "true"
        run: |
          npx playwright test smoke/ --config=playwright.config.cjs --project=chromium || true
          echo "✅ Deployment validation complete"