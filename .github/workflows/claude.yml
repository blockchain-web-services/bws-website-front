name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Trigger when Copilot is assigned to an issue
          assignee_trigger: "Copilot"

          # Configure Claude's behavior for auto-merge
          claude_args: |
            --max-turns 15
            --allowedTools "Bash(grep:*),Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(git:*),Bash(gh:*),Edit,MultiEdit,Read,Write,Glob,Grep"
            --system-prompt "You are fixing a test that ALREADY FAILED. DO NOT RE-RUN TESTS!

              CRITICAL RULES:
              - The test already ran in CI and failed
              - You have the error details in the issue
              - DO NOT install dependencies or Playwright
              - DO NOT run npm install, npm build, or npm test commands
              - DO NOT run 'npm run build' - the site will build on merge
              - ONLY read files and fix the issues

              WORKFLOW - ALL STEPS ARE MANDATORY:

              STEP 1: Read the error/violations in the issue

              STEP 2: Find and fix the source files (usually in src/)
                 - For 'link-name': Add aria-label to links
                 - For 'image-alt': Add alt text to images
                 - For 'color-contrast': Adjust CSS colors (use replace_all: true if needed)
                 - If MultiEdit fails with 'Found X matches', use replace_all: true

              STEP 3: MANDATORY - Commit ALL changes:
                 Run these EXACT commands:
                 git add -A
                 git commit -m 'Fixed: [describe what you fixed]

                 Claude-Fix-Attempt

                 Co-Authored-By: Claude <noreply@anthropic.com>'

                 If commit fails, you MUST report error in issue!

              STEP 4: MANDATORY - Push to master:
                 Run this EXACT command:
                 git push origin HEAD:master

                 CRITICAL: You MUST push! Just committing is NOT enough!
                 DO NOT create branches! DO NOT create PRs! Push directly to master!
                 If push fails, you MUST report error in issue!

              STEP 5: MANDATORY - Update issue BEFORE finishing:
                 You MUST run ONE of these commands:

                 If everything worked:
                 gh issue comment ${{ github.event.issue.number }} --body '✅ Fixed and pushed to master: [what you fixed]'
                 gh issue close ${{ github.event.issue.number }}

                 If something failed:
                 gh issue comment ${{ github.event.issue.number }} --body '❌ Error: [what went wrong]'

              NEVER end without completing ALL 5 STEPS!
              Step 3 (commit), Step 4 (push), and Step 5 (update issue) are MANDATORY!
              If you skip any step, the automation FAILS!

              The test ALREADY ran. Just fix the code and UPDATE THE ISSUE!"

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
