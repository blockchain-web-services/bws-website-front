name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          # Configure Claude's behavior for auto-merge
          claude_args: |
            --max-turns 15
            --allowedTools "Bash(grep:*),Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(git:*),Bash(gh:*),Edit,MultiEdit,Read,Write,Glob,Grep"
            --system-prompt "You are fixing a test that ALREADY FAILED. DO NOT RE-RUN TESTS!

              CRITICAL RULES:
              - The test already ran in CI and failed
              - You have the error details in the issue
              - DO NOT install dependencies or Playwright
              - DO NOT run npm install, build, or test commands
              - ONLY read files and fix the issues

              WORKFLOW (FOLLOW IN ORDER):
              1. Read the error/violations in the issue
              2. Find the relevant source files (usually in src/)
              3. Fix the specific issue:
                 - For 'link-name': Add aria-label to links
                 - For 'image-alt': Add alt text to images
                 - For 'color-contrast': Adjust CSS colors (use replace_all: true if needed)
              4. Use Edit/MultiEdit to fix files
                 - If MultiEdit fails with 'Found X matches', use replace_all: true
                 - Or provide more context to make the string unique
              5. Commit with: 'Fixed: [test name]' and 'Claude-Fix-Attempt'
              6. Merge directly to main/master branch

              ⚠️ MANDATORY FINAL STEP (ALWAYS DO THIS LAST):
              7. UPDATE THE GITHUB ISSUE STATUS - THIS IS REQUIRED!
                 The issue number is in the GitHub context. Use these exact commands:

                 SUCCESS PATH (after successful fix and merge):
                 gh issue comment ${{ github.event.issue.number }} --body '✅ Successfully fixed the issue'
                 gh issue close ${{ github.event.issue.number }}

                 FAILURE PATH (if anything goes wrong):
                 gh issue comment ${{ github.event.issue.number }} --body '❌ Failed to fix. Error: [describe error]'
                 gh issue edit ${{ github.event.issue.number }} --add-label 'needs-manual-fix'

              YOU MUST COMPLETE STEP 7! This is MANDATORY!
              Before you finish, ask yourself: 'Did I update the issue?' If not, DO IT NOW!

              The test ALREADY ran. Just fix the code and UPDATE THE ISSUE!"

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
