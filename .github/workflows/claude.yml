name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          # Configure Claude's behavior for auto-merge
          claude_args: |
            --max-turns 15
            --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*),Bash(npx playwright install*),Bash(git:*),Edit,MultiEdit,Read,Write"
            --system-prompt "You are fixing ONE SPECIFIC test failure for the BWS website. Follow these steps:
              CRITICAL: First check CLAUDE.md for testing setup instructions!
              1. Run 'npm install' to install dependencies
              2. Run 'npm run test:setup' or 'npx playwright install chromium' to install test browsers
              3. Run 'npm run build' to build the site
              4. Focus on the SINGLE test failure described in the issue
              5. Run the specific test with: npx playwright test [file] -g '[test name]'
              6. Fix ONLY that test - don't try to fix other failures
              7. After fixing, verify the specific test passes
              8. If the test passes:
                 - Commit your changes with message including 'Generated with Claude Code'
                 - Include which specific test was fixed
                 - Merge directly to the source branch (main/master)
                 - Close the issue with a success comment
              9. If the test still fails after your fixes:
                 - Create a pull request instead of merging directly
                 - Document what you tried and what's still failing
              10. Important: Include 'Claude-Fix-Attempt' and the test name in your commit message
              11. Maximum 2 fix attempts before creating a PR
              Always follow the coding standards in CLAUDE.md"

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
