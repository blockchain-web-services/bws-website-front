name: HTML Validation

on:
  push:
    branches: [ main, master ]
    paths:
      - '**/*.html'
      - '.htmlvalidate.json'
      - '.htmlhintrc'
      - '.prettierrc'
      - 'package.json'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**/*.html'
      - '.htmlvalidate.json'
      - '.htmlhintrc'
      - '.prettierrc'
      - 'package.json'
  workflow_dispatch:

jobs:
  validate-html:
    runs-on: ubuntu-latest
    name: Validate HTML Files
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run HTML Validator
        id: html-validate
        run: |
          echo "## HTML Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Run html-validate and capture output
          if npm run validate:html 2>&1 | tee validation-output.txt; then
            echo "✅ HTML validation passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ HTML validation failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Validation Errors:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat validation-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
      
      - name: Run HTMLHint
        id: htmlhint
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## HTMLHint Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if npm run lint:html 2>&1 | tee htmlhint-output.txt; then
            echo "✅ HTMLHint passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ HTMLHint found issues" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Linting Issues:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat htmlhint-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Check HTML Formatting
        id: prettier-check
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Prettier Formatting Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if npm run format:html:check 2>&1 | tee prettier-output.txt; then
            echo "✅ HTML formatting is correct" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ HTML files need formatting" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Files needing formatting:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat prettier-output.txt | grep -E "^\[" >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Run \`npm run format:html\` to fix formatting issues" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Comment PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔍 HTML Validation Results\n\n';
            
            try {
              const validationOutput = fs.readFileSync('validation-output.txt', 'utf8');
              if (validationOutput.includes('error')) {
                comment += '### ❌ HTML Validation Errors Found\n\n';
                comment += '```\n' + validationOutput + '\n```\n\n';
              }
            } catch (e) {}
            
            try {
              const htmlhintOutput = fs.readFileSync('htmlhint-output.txt', 'utf8');
              if (htmlhintOutput.includes('error') || htmlhintOutput.includes('warning')) {
                comment += '### ⚠️ HTMLHint Issues\n\n';
                comment += '```\n' + htmlhintOutput + '\n```\n\n';
              }
            } catch (e) {}
            
            comment += '**Please fix these issues before merging.**';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Upload validation reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: html-validation-reports
          path: |
            validation-output.txt
            htmlhint-output.txt
            prettier-output.txt
          retention-days: 7