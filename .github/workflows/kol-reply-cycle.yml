name: KOL Reply Cycle

on:
  schedule:
    - cron: '15 2 * * *'    # 02:15 UTC - Late night (varies from monitor)
    - cron: '30 7 * * *'    # 07:30 UTC - Early morning
    - cron: '45 11 * * *'   # 11:45 UTC - Midday
    - cron: '20 15 * * *'   # 15:20 UTC - Afternoon
    - cron: '50 19 * * *'   # 19:50 UTC - Evening
    - cron: '10 23 * * *'   # 23:10 UTC - Late night
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  MAX_REPLIES_PER_RUN: "1"  # Reduced to 1 to avoid spam detection (Twitter blocks multiple sequential replies)

jobs:
  post-replies:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Prevent 6-hour timeout waste from rate limiting
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install twitter-api-v2 @anthropic-ai/sdk

      - name: Verify proxy configuration
        run: |
          echo "Checking proxy configuration..."
          if [ -z "$OXYLABS_USERNAME" ] || [ -z "$OXYLABS_PASSWORD" ]; then
            echo "❌ ERROR: Proxy credentials not found!"
            echo "   OXYLABS_USERNAME: ${OXYLABS_USERNAME:+set}"
            echo "   OXYLABS_PASSWORD: ${OXYLABS_PASSWORD:+set}"
            echo ""
            echo "   Without proxy, production will fail with 403 errors!"
            echo "   Twitter blocks automated posting from GitHub Actions IPs"
            exit 1
          fi
          echo "✅ Proxy credentials configured"
        env:
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}

      - name: Run reply generation and posting
        id: reply
        env:
          BWSXAI_TWITTER_BEARER_TOKEN: ${{ secrets.BWSXAI_TWITTER_BEARER_TOKEN }}
          BWSXAI_TWITTER_API_KEY: ${{ secrets.BWSXAI_TWITTER_API_KEY }}
          BWSXAI_TWITTER_API_SECRET: ${{ secrets.BWSXAI_TWITTER_API_SECRET }}
          BWSXAI_TWITTER_ACCESS_TOKEN: ${{ secrets.BWSXAI_TWITTER_ACCESS_TOKEN }}
          BWSXAI_TWITTER_ACCESS_SECRET: ${{ secrets.BWSXAI_TWITTER_ACCESS_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAT_REPOS_AND_WORKFLOW: ${{ secrets.PAT_REPOS_AND_WORKFLOW }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          CI: true
          GITHUB_ACTIONS: true
        run: |
          echo "Starting reply cycle (Script 2.3.1 - processes queue from engaging-posts.json)..."
          node scripts/crawling/production/reply-to-kol-posts.js
          echo "reply_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet scripts/crawling/data/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Get stats
        id: stats
        run: |
          if [ -f "scripts/crawling/data/kol-replies.json" ]; then
            TOTAL_REPLIES=$(jq '.replies | length' scripts/crawling/data/kol-replies.json)
            TODAY=$(date +'%Y-%m-%d')
            TODAY_REPLIES=$(jq --arg date "$TODAY" '[.replies[] | select(.timestamp | startswith($date))] | length' scripts/crawling/data/kol-replies.json)
            echo "total=$TOTAL_REPLIES" >> $GITHUB_OUTPUT
            echo "today=$TODAY_REPLIES" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/crawling/data/

          TIMESTAMP=$(date +'%Y-%m-%d %H:%M UTC')
          TOTAL="${{ steps.stats.outputs.total }}"
          TODAY="${{ steps.stats.outputs.today }}"

          git commit -m "KOL reply cycle - $TIMESTAMP" \
            -m "" \
            -m "Total replies: $TOTAL | Today: $TODAY" \
            -m "" \
            -m "Generated with Claude Code (https://claude.com/claude-code)" \
            -m "" \
            -m "Co-Authored-By: Claude <noreply@anthropic.com>"

          git push

      - name: Summary
        run: |
          echo "## 💬 Reply Cycle Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date +'%H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Replies:** ${{ steps.stats.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Today:** ${{ steps.stats.outputs.today }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Posted This Run:** ${{ steps.changes.outputs.has_changes == 'true' && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY
