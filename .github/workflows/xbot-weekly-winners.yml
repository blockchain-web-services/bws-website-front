name: X Bot Weekly Winners Post

on:
  # TEMPORARILY DISABLED
  # schedule:
  #   - cron: '0 10 * * 1'  # Every Monday at 10:00 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (scrape and generate but do not post to Twitter)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  post-xbot-winners:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install project dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: |
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Post X Bot Weekly Winners
        id: post
        env:
          # Twitter API credentials (for @BWSCommunity account)
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          # Proxy credentials (for GitHub Actions)
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          # Dry run mode
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "🚀 Starting X Bot Weekly Winners post..."

          if [ "$DRY_RUN" = "true" ]; then
            echo "⚠️  DRY RUN MODE - Will not post to Twitter"
            echo "This script will run without dry-run detection. Manual verification required."
          fi

          node scripts/crawling/production/post-xbot-weekly.js

          echo "post_status=success" >> $GITHUB_OUTPUT

      - name: Upload screenshot artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xbot-screenshot-${{ github.run_number }}
          path: temp/xbot-weekly-*.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Workflow Summary
        if: always()
        run: |
          if [ "${{ steps.post.outputs.post_status }}" = "success" ]; then
            echo "✅ X Bot Weekly Winners posted successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Workflow Run:** [View Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
            echo "**Schedule:** Every Monday at 10:00 AM UTC" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ X Bot Weekly Winners post failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Workflow Run:** [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Troubleshooting Steps:" >> $GITHUB_STEP_SUMMARY
            echo "1. Check Twitter API credentials (TWITTER_* secrets)" >> $GITHUB_STEP_SUMMARY
            echo "2. Verify xbot.ninja is accessible" >> $GITHUB_STEP_SUMMARY
            echo "3. Review workflow logs for specific error" >> $GITHUB_STEP_SUMMARY
            echo "4. Test locally: \`node scripts/crawling/production/post-xbot-weekly.js\`" >> $GITHUB_STEP_SUMMARY
          fi
