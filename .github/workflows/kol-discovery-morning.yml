name: KOL Discovery - Morning

on:
  # TEMPORARILY DISABLED
  # schedule:
  #   - cron: '9 9 * * 1,3,5'  # Mon/Wed/Fri at 09:09 UTC (Option B schedule)
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  discover-kols:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install crawlee playwright @anthropic-ai/sdk

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run KOL discovery with Web Unblocker (Batch)
        id: discover
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
        run: |
          echo "Starting morning KOL discovery with Web Unblocker (batch mode)..."
          echo "Batch size: 10 profiles per run"
          node scripts/crawling/production/discover-web-unblocker-batch.js
          # Script exit code determines success (0 = success, 1 = failure)

      - name: Check for changes
        id: changes
        run: |
          # Check if either kols-data.json or kol-candidates.json changed
          if git diff --quiet scripts/crawling/data/kols-data.json && \
             git diff --quiet scripts/crawling/config/kol-candidates.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠️  WARNING: No new KOLs discovered!"
            echo "This indicates the discovery process found no new accounts."
            echo "The workflow will fail to alert the team."
            exit 1
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ New KOLs discovered and added to database"

            # Check how many candidates were removed
            if ! git diff --quiet scripts/crawling/config/kol-candidates.json; then
              echo "✅ Candidate list updated (successful additions removed)"
            fi
          fi

      - name: Get stats
        id: stats
        run: |
          if [ -f "scripts/crawling/data/kols-data.json" ]; then
            TOTAL=$(jq '.kols | length' scripts/crawling/data/kols-data.json)
            ACTIVE=$(jq '[.kols[] | select(.status == "active")] | length' scripts/crawling/data/kols-data.json)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add both KOL data and updated candidates list
          git add scripts/crawling/data/kols-data.json
          git add scripts/crawling/config/kol-candidates.json

          git commit -m "Morning KOL discovery (Web Unblocker batch) - $(date +'%Y-%m-%d %H:%M UTC')

          Total: ${{ steps.stats.outputs.total }} | Active: ${{ steps.stats.outputs.active }}
          Batch: 10 profiles processed, successful KOLs added
          Processed candidates removed from queue

          🤖 Generated with [Claude Code](https://claude.com/claude-code)"
          git push

      - name: Summary
        run: |
          echo "## 🌅 Morning Discovery Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date +'%H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Total KOLs:** ${{ steps.stats.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Active:** ${{ steps.stats.outputs.active }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New Additions:** ${{ steps.changes.outputs.has_changes == 'true' && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY
