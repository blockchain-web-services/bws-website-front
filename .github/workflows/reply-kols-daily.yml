name: KOL Reply (4x Daily)

on:
  schedule:
    - cron: '30 0,6,12,18 * * *'  # 4x daily: 30min after each discovery cycle
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  NODE_VERSION: "20"

jobs:
  reply-to-kols:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Prevent 6-hour timeout waste from rate limiting
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Install script dependencies
        run: npm install twitter-api-v2 @anthropic-ai/sdk

      - name: Check if KOLs exist
        id: check-kols
        run: |
          if [ -f "scripts/kols/data/kols-data.json" ]; then
            KOLS_COUNT=$(jq '.kols | length' scripts/kols/data/kols-data.json)
            if [ "$KOLS_COUNT" -gt 0 ]; then
              echo "has_kols=true" >> $GITHUB_OUTPUT
              echo "kols_count=$KOLS_COUNT" >> $GITHUB_OUTPUT
            else
              echo "has_kols=false" >> $GITHUB_OUTPUT
              echo "kols_count=0" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_kols=false" >> $GITHUB_OUTPUT
            echo "kols_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Run KOL reply evaluation
        if: steps.check-kols.outputs.has_kols == 'true'
        id: reply
        env:
          BWSXAI_TWITTER_BEARER_TOKEN: ${{ secrets.BWSXAI_TWITTER_BEARER_TOKEN }}
          BWSXAI_TWITTER_API_KEY: ${{ secrets.BWSXAI_TWITTER_API_KEY }}
          BWSXAI_TWITTER_API_SECRET: ${{ secrets.BWSXAI_TWITTER_API_SECRET }}
          BWSXAI_TWITTER_ACCESS_TOKEN: ${{ secrets.BWSXAI_TWITTER_ACCESS_TOKEN }}
          BWSXAI_TWITTER_ACCESS_SECRET: ${{ secrets.BWSXAI_TWITTER_ACCESS_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Starting KOL reply evaluation..."
          node scripts/kols/evaluate-and-reply-kols.js
          echo "reply_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet scripts/kols/data/ || echo "has_changes=true" >> $GITHUB_OUTPUT
          git diff --quiet scripts/kols/data/ && echo "has_changes=false" >> $GITHUB_OUTPUT

      - name: Get reply stats
        if: steps.reply.outputs.reply_status == 'success'
        id: stats
        run: |
          if [ -f "scripts/kols/data/kol-replies.json" ]; then
            TOTAL_REPLIES=$(jq '.replies | length' scripts/kols/data/kol-replies.json)
            SUCCESSFUL_REPLIES=$(jq '[.replies[] | select(.status == "posted")] | length' scripts/kols/data/kol-replies.json)

            TODAY=$(date +'%Y-%m-%d')
            TODAY_REPLIES=$(jq --arg date "$TODAY" '[.replies[] | select(.timestamp | startswith($date))] | length' scripts/kols/data/kol-replies.json)

            echo "total_replies=$TOTAL_REPLIES" >> $GITHUB_OUTPUT
            echo "successful_replies=$SUCCESSFUL_REPLIES" >> $GITHUB_OUTPUT
            echo "today_replies=$TODAY_REPLIES" >> $GITHUB_OUTPUT
          else
            echo "total_replies=0" >> $GITHUB_OUTPUT
            echo "successful_replies=0" >> $GITHUB_OUTPUT
            echo "today_replies=0" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true' && steps.reply.outputs.reply_status == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/kols/data/
          git commit -m "Update KOL reply data - $(date +'%Y-%m-%d')

          Replies today: ${{ steps.stats.outputs.today_replies }}
          Total replies: ${{ steps.stats.outputs.total_replies }}
          Success rate: $(echo "scale=1; ${{ steps.stats.outputs.successful_replies }} * 100 / ${{ steps.stats.outputs.total_replies }}" | bc)%

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push

      - name: Create summary
        if: steps.reply.outputs.reply_status == 'success'
        run: |
          echo "## 💬 KOL Reply Process Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Replies Today:** ${{ steps.stats.outputs.today_replies }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Replies (All Time):** ${{ steps.stats.outputs.total_replies }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Successful Replies:** ${{ steps.stats.outputs.successful_replies }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.stats.outputs.total_replies }}" -gt 0 ]; then
            SUCCESS_RATE=$(echo "scale=1; ${{ steps.stats.outputs.successful_replies }} * 100 / ${{ steps.stats.outputs.total_replies }}" | bc)
            echo "- **Success Rate:** ${SUCCESS_RATE}%" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Changes Committed:** ${{ steps.changes.outputs.has_changes == 'true' && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Skip if no KOLs
        if: steps.check-kols.outputs.has_kols == 'false'
        run: |
          echo "## ⚠️  No KOLs Found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The reply process was skipped because no KOLs are in the database." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action Required:** Run the KOL discovery workflow first." >> $GITHUB_STEP_SUMMARY

  handle-failure:
    needs: reply-to-kols
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create fix branch
        id: fix-branch
        run: |
          BRANCH_NAME="fix/kol-reply-failed-$(date +'%Y%m%d-%H%M%S')"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git push -u origin "$BRANCH_NAME"

      - name: Create issue and PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_BODY="## KOL Reply Workflow Failed

          The daily KOL reply workflow failed on $(date +'%Y-%m-%d at %H:%M:%S UTC').

          ### Possible Causes
          - API rate limits exceeded
          - Invalid or expired API credentials (Twitter write access)
          - Network connectivity issues
          - No active KOLs in database
          - Configuration errors in kol-config.json

          ### Required Actions
          1. Check the workflow logs for specific errors
          2. Verify ALL BWSXAI Twitter OAuth credentials in repository secrets:
             - BWSXAI_TWITTER_API_KEY
             - BWSXAI_TWITTER_API_SECRET
             - BWSXAI_TWITTER_ACCESS_TOKEN
             - BWSXAI_TWITTER_ACCESS_SECRET
          3. Check if KOLs exist in the database
          4. Review reply settings in kol-config.json
          5. Test locally with: \`node scripts/kols/test-kol-system.js\`

          ### Workflow Run
          [View failed run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---
          🤖 Auto-generated issue"

          ISSUE_NUMBER=$(gh issue create \
            --title "KOL Reply Failed - $(date +'%Y-%m-%d')" \
            --body "$ISSUE_BODY" \
            --label "bug,automated,kol-system" \
            --assignee "${{ github.actor }}" | grep -oP '\d+$')

          echo "Created issue #$ISSUE_NUMBER"

          PR_BODY="## Fix KOL Reply Workflow Failure

          This PR was automatically created to address the KOL reply workflow failure.

          Related issue: #$ISSUE_NUMBER

          ### What to do
          1. Review the error logs
          2. Make necessary fixes
          3. Test locally with: \`node scripts/kols/evaluate-and-reply-kols.js\`
          4. Update this PR with your changes

          ---
          🤖 Auto-generated PR"

          gh pr create \
            --title "Fix: KOL Reply Failure - $(date +'%Y-%m-%d')" \
            --body "$PR_BODY" \
            --base main \
            --head "${{ steps.fix-branch.outputs.branch_name }}" \
            --label "bug,automated,kol-system" \
            --assignee "${{ github.actor }}" || echo "PR creation failed or already exists"
