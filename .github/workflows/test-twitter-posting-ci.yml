name: Test Twitter Posting (CI Environment)

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode'
        required: false
        default: 'standard'
        type: choice
        options:
          - standard
          - with_proxy

jobs:
  test-posting:
    name: Test Twitter Posting
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test Twitter Posting (with proxy support)
        run: |
          echo "Testing Twitter posting in CI environment..."
          echo "This uses the EXACT same setup as actual workflows"
          echo ""
          node scripts/test-twitter-posting-ci.js
        env:
          # Twitter credentials (same as actual posting workflows)
          BWSXAI_TWITTER_API_KEY: ${{ secrets.BWSXAI_TWITTER_API_KEY }}
          BWSXAI_TWITTER_API_SECRET: ${{ secrets.BWSXAI_TWITTER_API_SECRET }}
          BWSXAI_TWITTER_ACCESS_TOKEN: ${{ secrets.BWSXAI_TWITTER_ACCESS_TOKEN }}
          BWSXAI_TWITTER_ACCESS_SECRET: ${{ secrets.BWSXAI_TWITTER_ACCESS_SECRET }}

          # Proxy credentials (optional, used by createReadWriteClient when on CI)
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}

          # CI environment markers
          CI: true
          GITHUB_ACTIONS: true

      - name: Summary
        if: always()
        run: |
          echo "## Twitter Posting Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $? -eq 0 ]; then
            echo "✅ **SUCCESS** - Twitter posting works in CI environment" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The exact same client setup used by workflows is functioning correctly." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **FAILED** - Twitter posting not working in CI" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for detailed error information." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Common issues:" >> $GITHUB_STEP_SUMMARY
            echo "- 403: Account restrictions or OAuth permission issues" >> $GITHUB_STEP_SUMMARY
            echo "- 429: Rate limiting" >> $GITHUB_STEP_SUMMARY
            echo "- Network: Proxy or firewall blocking" >> $GITHUB_STEP_SUMMARY
          fi
