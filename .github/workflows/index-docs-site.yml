name: Index Documentation Site

on:
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  index-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run documentation indexing script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/index-docs-site.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/data/docs-index.json public/assets/images/docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update docs index and images from weekly crawl [skip ci]"
            git push
          fi
