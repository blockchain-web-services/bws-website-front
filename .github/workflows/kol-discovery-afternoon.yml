name: KOL Discovery - Afternoon

on:
  # DISABLED: Moved to Option B schedule (Mon/Wed/Fri morning only)
  # This reduces API quota consumption and prevents 429 rate limit errors
  # Can still be manually triggered via workflow_dispatch if needed
  # schedule:
  #   - cron: '30 12 * * *'  # 12:30 UTC
  #   - cron: '0 15 * * *'   # 15:00 UTC
  #   - cron: '0 18 * * *'   # 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  MAX_QUERIES: "1"

jobs:
  discover-kols:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install twitter-api-v2 @anthropic-ai/sdk

      - name: Run search-based discovery (1 query)
        id: discover
        env:
          BWSXAI_TWITTER_BEARER_TOKEN: ${{ secrets.BWSXAI_TWITTER_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Starting afternoon KOL discovery..."
          node scripts/kols/discover-by-engagement.js
          echo "discover_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet scripts/kols/data/kols-data.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Get stats
        id: stats
        run: |
          if [ -f "scripts/kols/data/kols-data.json" ]; then
            TOTAL=$(jq '.kols | length' scripts/kols/data/kols-data.json)
            ACTIVE=$(jq '[.kols[] | select(.status == "active")] | length' scripts/kols/data/kols-data.json)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/kols/data/kols-data.json
          git commit -m "Afternoon KOL discovery - $(date +'%Y-%m-%d %H:%M UTC')

          Total: ${{ steps.stats.outputs.total }} | Active: ${{ steps.stats.outputs.active }}

          🤖 Generated with [Claude Code](https://claude.com/claude-code)"
          git push

      - name: Summary
        run: |
          echo "## 🌤️ Afternoon Discovery Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date +'%H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Total KOLs:** ${{ steps.stats.outputs.total }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Active:** ${{ steps.stats.outputs.active }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New Additions:** ${{ steps.changes.outputs.has_changes == 'true' && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY
