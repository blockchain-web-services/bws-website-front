name: Discover Documentation Pages

on:
  schedule:
    # Run daily at 2 AM UTC (before weekly docs indexing)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  discover:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Discover documentation pages
        run: node scripts/discover-docs-pages.js

      - name: Check for changes
        id: changes
        run: |
          git diff --exit-code scripts/data/discovered-paths.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/data/discovered-paths.json

          # Get stats for commit message
          TOTAL=$(node -e "const d=require('./scripts/data/discovered-paths.json'); console.log(d.totalPaths);")

          git commit -m "Auto-update: Discovered ${TOTAL} documentation pages

          Updated by daily discovery workflow
          Discovered at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          git push

      - name: Trigger docs indexing if new pages found
        if: steps.changes.outputs.changed == 'true'
        run: |
          gh workflow run index-docs-site.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          if [ -f scripts/data/discovered-paths.json ]; then
            echo "## Discovery Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const d = require('./scripts/data/discovered-paths.json');
              console.log('**Total Pages:** ' + d.totalPaths);
              console.log('');
              console.log('**By Category:**');
              Object.entries(d.categories).forEach(([cat, paths]) => {
                if (paths.length > 0) {
                  console.log('- ' + cat + ': ' + paths.length + ' pages');
                }
              });
            " >> $GITHUB_STEP_SUMMARY
          fi
