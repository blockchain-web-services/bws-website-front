name: Build, Test, and Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # Job 1: Run test suite
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium]
    name: Test - ${{ matrix.browser }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            package.json
            tests/package.json

      - name: Install build dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build site
        run: npm run build

      - name: Install test dependencies
        working-directory: tests
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        id: test-run
        working-directory: tests
        env:
          PORT: 4321
          PLAYWRIGHT_BASE_URL: http://localhost:4321
        run: |
          # Run tests with reporters configured in playwright.config.cjs
          # In CI, this will use JSON reporter outputting to test-results.json
          # The test command will fail the job if any tests fail
          npx playwright test --config=playwright.config.cjs --project=${{ matrix.browser }} 2>&1 | tee test-output.txt
          # Store exit code to check if we need to collect error details
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "test_exit_code=${TEST_EXIT_CODE}" >> $GITHUB_OUTPUT
          # Exit with the test exit code to fail the job if tests failed
          exit ${TEST_EXIT_CODE}

      - name: Upload test summary only
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-summary-${{ matrix.browser }}
          path: |
            tests/test-results.json
            tests/test-output.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Collect and format test errors
        if: failure()
        working-directory: tests
        run: |
          echo "Collecting test errors..."

          # Check what test output files exist
          echo "Test output files:"
          ls -la test-*.* 2>/dev/null || true
          ls -la test-results/ 2>/dev/null || true

          # Create detailed error report for BRANCH_ISSUES.md
          echo "# Test Failure Report" > ../BRANCH_ISSUES.md
          echo "" >> ../BRANCH_ISSUES.md
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> ../BRANCH_ISSUES.md
          echo "**Workflow Run:** [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> ../BRANCH_ISSUES.md
          echo "**Commit:** ${{ github.sha }}" >> ../BRANCH_ISSUES.md
          echo "" >> ../BRANCH_ISSUES.md

          echo "## Test Results Summary" >> ../BRANCH_ISSUES.md
          if [ -f "test-results.json" ]; then
            # Extract test results and format as clean markdown
            if command -v jq >/dev/null 2>&1; then
              # Extract stats
              echo "### Statistics" >> ../BRANCH_ISSUES.md
              jq -r '.stats | "- **Total Tests:** \(.expected)\n- **Passed:** ✅ \(.passed)\n- **Failed:** ❌ \(.failed)\n- **Skipped:** ⏭️ \(.skipped)\n- **Duration:** \(.duration)ms"' test-results.json 2>/dev/null >> ../BRANCH_ISSUES.md || echo "Could not extract stats" >> ../BRANCH_ISSUES.md
              echo "" >> ../BRANCH_ISSUES.md

              # Extract failed tests grouped by suite
              echo "### Failed Tests" >> ../BRANCH_ISSUES.md
              echo "" >> ../BRANCH_ISSUES.md

              # Process each suite and its failed tests
              jq -r '
                .suites[] |
                select(.specs[].tests[].status == "failed") |
                "#### Suite: \(.title)\n**File:** `\(.file)`\n" +
                (.specs[] |
                  select(.tests[].status == "failed") |
                  "\n##### Test: \(.title)\n" +
                  (.tests[] |
                    select(.status == "failed") |
                    "- **Status:** ❌ Failed\n" +
                    "- **Duration:** \(.duration)ms\n" +
                    if .error then
                      "- **Error Message:**\n```\n\(.error.message | gsub("\\u001b\\[[0-9;]*m"; "") | gsub("\\\\n"; "\n") | gsub("\\\\t"; "  "))\n```\n" +
                      if .error.snippet then
                        "- **Code Snippet:**\n```javascript\n\(.error.snippet | gsub("\\u001b\\[[0-9;]*m"; ""))\n```\n"
                      else "" end
                    else
                      ""
                    end
                  )
                )
              ' test-results.json 2>/dev/null >> ../BRANCH_ISSUES.md || {
                echo "Could not parse test details, showing raw summary:" >> ../BRANCH_ISSUES.md
                echo '```' >> ../BRANCH_ISSUES.md
                jq '.stats' test-results.json 2>/dev/null | head -20 >> ../BRANCH_ISSUES.md
                echo '```' >> ../BRANCH_ISSUES.md
              }
            else
              echo "jq not available, cannot parse test-results.json" >> ../BRANCH_ISSUES.md
            fi
          else
            echo "No test-results.json file found" >> ../BRANCH_ISSUES.md
          fi
          echo "" >> ../BRANCH_ISSUES.md

          echo "## Test Execution Log (Cleaned)" >> ../BRANCH_ISSUES.md
          if [ -f "test-output.txt" ]; then
            echo "### Failed Test Output Only" >> ../BRANCH_ISSUES.md
            echo '```' >> ../BRANCH_ISSUES.md
            # Extract only failed test output and clean ANSI codes
            grep -A 10 -B 2 -E "✗|✘|FAILED|Error:|AssertionError|expected.*received" test-output.txt 2>/dev/null | \
              sed 's/\x1b\[[0-9;]*m//g' | \
              sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' | \
              sed 's/\\u001b\[[0-9;]*m//g' | \
              sed 's/\[39m//g' | \
              sed 's/\[31m//g' | \
              sed 's/\[32m//g' | \
              sed 's/\[90m//g' | \
              sed 's/\[2m//g' | \
              head -200 >> ../BRANCH_ISSUES.md || echo "No specific failures found in output" >> ../BRANCH_ISSUES.md
            echo '```' >> ../BRANCH_ISSUES.md
          else
            echo "No test-output.txt file found" >> ../BRANCH_ISSUES.md
          fi
          echo "" >> ../BRANCH_ISSUES.md

          echo "## Environment Information" >> ../BRANCH_ISSUES.md
          echo "- **Runner OS:** ${{ runner.os }}" >> ../BRANCH_ISSUES.md
          echo "- **Node Version:** ${{ env.NODE_VERSION }}" >> ../BRANCH_ISSUES.md
          echo "- **Browser:** ${{ matrix.browser }}" >> ../BRANCH_ISSUES.md

          # Create clean markdown issue content
          echo "## 🔴 Test Failure Report" > issue-content.md
          echo "" >> issue-content.md
          echo "**Commit:** \`${{ github.sha }}\`" >> issue-content.md
          echo "**Branch:** ${{ github.ref_name }}" >> issue-content.md
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> issue-content.md
          echo "" >> issue-content.md

          # Add summary stats if available
          if [ -f "test-results.json" ] && command -v jq >/dev/null 2>&1; then
            echo "### 📊 Summary" >> issue-content.md
            jq -r '.stats | "- Total Tests: **\(.expected)**\n- ✅ Passed: **\(.passed)**\n- ❌ Failed: **\(.failed)**\n- ⏭️ Skipped: **\(.skipped)**"' test-results.json 2>/dev/null >> issue-content.md || echo "- Could not extract stats" >> issue-content.md
            echo "" >> issue-content.md

            # Extract failed test details in clean format
            echo "### 🚨 Failed Tests" >> issue-content.md
            echo "" >> issue-content.md
            jq -r '
              .suites[] |
              select(.specs[].tests[].status == "failed") |
              .specs[] |
              select(.tests[].status == "failed") |
              "**\(.title)**\n" +
              (.tests[] |
                select(.status == "failed") |
                "- Test: \(.title)\n" +
                if .error.message then
                  "  - Error: `\(.error.message | gsub("\\u001b\\[[0-9;]*m"; "") | split("\n")[0] | .[0:100])`\n"
                else "" end
              )
            ' test-results.json 2>/dev/null | head -20 >> issue-content.md || echo "Could not extract failed test details" >> issue-content.md
            echo "" >> issue-content.md
          fi

          echo "### 📝 Next Steps" >> issue-content.md
          echo "1. A branch with detailed error logs has been created" >> issue-content.md
          echo "2. Review the BRANCH_ISSUES.md file in that branch" >> issue-content.md
          echo "3. Fix the failing tests and create a PR" >> issue-content.md
          echo "" >> issue-content.md
          echo "**Workflow Run:** [View Full Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> issue-content.md

      - name: Create branch and issue for failures
        if: failure() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            // Generate branch name
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
            const shortSha = context.sha.substring(0, 7);
            const branchName = `fix/test-failures-${timestamp}-${shortSha}`;

            console.log(`Creating branch: ${branchName}`);

            try {
              // Configure git with PAT for authentication
              execSync('git config user.name "github-actions[bot]"');
              execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');

              // Set up authentication with PAT
              const token = '${{ secrets.PAT_REPOS_AND_WORKFLOW }}';
              const remoteUrl = `https://x-access-token:${token}@github.com/${{ github.repository }}.git`;
              execSync(`git remote set-url origin ${remoteUrl}`);

              // Create and checkout new branch from current HEAD
              execSync(`git checkout -b ${branchName}`);

              // Check if BRANCH_ISSUES.md exists and add it
              if (fs.existsSync('BRANCH_ISSUES.md')) {
                console.log('Adding BRANCH_ISSUES.md to branch');
                execSync('git add BRANCH_ISSUES.md');
                execSync('git commit -m "Add test failure details in BRANCH_ISSUES.md"');

                // Push the branch
                execSync(`git push -u origin ${branchName}`);
                console.log(`Branch ${branchName} pushed successfully`);
              } else {
                console.error('BRANCH_ISSUES.md not found!');
                // Try to create it from available test outputs
                let content = '# Test Failure Report\n\n';
                content += `Generated: ${new Date().toISOString()}\n\n`;
                content += `Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n`;

                if (fs.existsSync('tests/test-output.txt')) {
                  content += '## Test Output\n```\n';
                  content += fs.readFileSync('tests/test-output.txt', 'utf8');
                  content += '\n```\n';
                }

                fs.writeFileSync('BRANCH_ISSUES.md', content);
                execSync('git add BRANCH_ISSUES.md');
                execSync('git commit -m "Add test failure details in BRANCH_ISSUES.md"');
                execSync(`git push -u origin ${branchName}`);
                console.log(`Branch ${branchName} pushed with generated BRANCH_ISSUES.md`);
              }
            } catch (gitError) {
              console.error('Error creating branch:', gitError.message);
              console.error('Git error output:', gitError.stdout?.toString() || 'No stdout');
              console.error('Git error stderr:', gitError.stderr?.toString() || 'No stderr');
            }

            // Read the issue content
            let issueBody;
            try {
              issueBody = fs.readFileSync('tests/issue-content.md', 'utf8');
            } catch (error) {
              console.log('No issue content file found, using default');
              issueBody = `## Test Failure Report\n\nTests failed in workflow run: [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\nPlease check the workflow logs for details.`;
            }

            // Add branch information to issue body
            issueBody += `\n\n## 📁 Error Details Branch\n\n`;
            issueBody += `A branch has been created with detailed error information:\n`;
            issueBody += `- **Branch:** [\`${branchName}\`](https://github.com/${{ github.repository }}/tree/${branchName})\n`;
            issueBody += `- **Error Details File:** [\`BRANCH_ISSUES.md\`](https://github.com/${{ github.repository }}/blob/${branchName}/BRANCH_ISSUES.md)\n\n`;
            issueBody += `To fix these issues:\n`;
            issueBody += `1. Check out the branch: \`git checkout ${branchName}\`\n`;
            issueBody += `2. Review the errors in \`BRANCH_ISSUES.md\`\n`;
            issueBody += `3. Fix the failing tests\n`;
            issueBody += `4. Push your fixes and create a PR\n`;

            // Check if similar issue already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['test-failure', 'automated'],
              state: 'open'
            });

            const today = new Date().toISOString().split('T')[0];
            const existingToday = existingIssues.data.find(issue =>
              issue.title.includes(today) && issue.title.includes('Test Failures')
            );

            if (!existingToday) {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔴 Test Failures - ${today} - ${context.sha.substring(0, 7)}`,
                body: issueBody,
                labels: ['test-failure', 'automated', 'urgent']
              });
              console.log(`Created issue #${issue.data.number}`);

              // Try to assign to claude (will silently fail if user doesn't exist)
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.data.number,
                  assignees: ['claude']
                });
              } catch (assignError) {
                console.log('Could not assign to claude:', assignError.message);
              }
            } else {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingToday.number,
                body: `## 🔄 Additional Test Failure\n\n${issueBody}`
              });
              console.log(`Added comment to existing issue #${existingToday.number}`);
            }

  # Job 2: Build for production
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package.json

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build production site
        run: |
          npm run build
          echo "${{ github.sha }}" > _site/deployment-sha.txt
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: _site/
          retention-days: 1

  # Job 3: Deploy to gh-pages branch
  deploy-gh-pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: https://www.bws.ninja
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: _site/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy ${{ github.sha }} to GitHub Pages"
          cname: www.bws.ninja

  # Job 4: Post-deployment smoke tests
  validate-deployment:
    runs-on: ubuntu-latest
    needs: deploy-gh-pages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against production
        id: smoke-test
        working-directory: tests
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: "https://www.bws.ninja"
          NO_WEBSERVER: "true"
        run: |
          # Run smoke tests (will output to test-results.json due to CI env)
          set -o pipefail
          npx playwright test smoke/ --config=playwright.config.cjs --project=chromium 2>&1 | tee smoke-test-output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "SMOKE_TESTS_FAILED=true" >> $GITHUB_ENV
            echo "⚠️ Production smoke tests failed"
          else
            echo "✅ Production smoke tests passed"
          fi

      - name: Check deployment health
        run: |
          echo "Checking production site health..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://www.bws.ninja/ || echo "000")
          echo "Homepage status: $response"
          [ "$response" = "200" ] || [ "$response" = "000" ] || exit 0
