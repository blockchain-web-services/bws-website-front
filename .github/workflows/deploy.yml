name: Build, Test, and Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # Job 1: Run test suite
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium]
    name: Test - ${{ matrix.browser }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            build/package.json
            tests/package.json

      - name: Install build dependencies
        working-directory: build
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build site
        working-directory: build
        run: npm run build

      - name: Install test dependencies
        working-directory: tests
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        id: test-run
        working-directory: tests
        env:
          PORT: 4321
          PLAYWRIGHT_BASE_URL: http://localhost:4321
        run: |
          # Run tests with reporters configured in playwright.config.cjs
          # In CI, this will use JSON reporter outputting to test-results.json
          # The test command will fail the job if any tests fail
          npx playwright test --config=playwright.config.cjs --project=${{ matrix.browser }} 2>&1 | tee test-output.txt
          # Store exit code to check if we need to collect error details
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          echo "test_exit_code=${TEST_EXIT_CODE}" >> $GITHUB_OUTPUT
          # Exit with the test exit code to fail the job if tests failed
          exit ${TEST_EXIT_CODE}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            tests/test-results/
            tests/test-results.json
            tests/test-output.txt
            tests/playwright-report/
          if-no-files-found: warn
          retention-days: 30

      - name: Collect and format test errors
        if: failure()
        working-directory: tests
        run: |
          echo "Collecting test errors..."

          # Check what test output files exist
          echo "Test output files:"
          ls -la test-*.* 2>/dev/null || true
          ls -la test-results/ 2>/dev/null || true

          # Create issue content from test output
          echo "## Test Failure Report" > issue-content.md
          echo "" >> issue-content.md
          echo "Tests failed in workflow run: [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> issue-content.md
          echo "" >> issue-content.md

          if [ -f "test-results.json" ]; then
            echo "### Test Results Summary" >> issue-content.md
            echo '```json' >> issue-content.md
            cat test-results.json | jq '.stats' 2>/dev/null || cat test-results.json | head -20
            echo '```' >> issue-content.md
            echo "" >> issue-content.md
          fi

          if [ -f "test-output.txt" ]; then
            echo "### Failed Test Output" >> issue-content.md
            echo '```' >> issue-content.md
            grep -A 5 -B 5 "✗\|Error:\|Failed:\|expected\|received" test-output.txt | head -100 || true
            echo '```' >> issue-content.md
          fi

      - name: Create GitHub Issue for failures
        if: failure() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read the issue content
            let issueBody;
            try {
              issueBody = fs.readFileSync('tests/issue-content.md', 'utf8');
            } catch (error) {
              console.log('No issue content file found, using default');
              issueBody = `## Test Failure Report\n\nTests failed in workflow run: [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\nPlease check the workflow logs for details.`;
            }

            // Check if similar issue already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['test-failure', 'automated'],
              state: 'open'
            });

            const today = new Date().toISOString().split('T')[0];
            const existingToday = existingIssues.data.find(issue =>
              issue.title.includes(today) && issue.title.includes('Test Failures')
            );

            if (!existingToday) {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔴 Test Failures - ${today} - ${context.sha.substring(0, 7)}`,
                body: issueBody,
                labels: ['test-failure', 'automated', 'urgent']
              });
              console.log(`Created issue #${issue.data.number}`);

              // Try to assign to claude (will silently fail if user doesn't exist)
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.data.number,
                  assignees: ['claude']
                });
              } catch (assignError) {
                console.log('Could not assign to claude:', assignError.message);
              }
            } else {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingToday.number,
                body: `## 🔄 Additional Test Failure\n\n${issueBody}`
              });
              console.log(`Added comment to existing issue #${existingToday.number}`);
            }

  # Job 2: Build for production
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: build/package-lock.json

      - name: Install dependencies
        working-directory: build
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build production site
        working-directory: build
        run: |
          npm run build
          echo "${{ github.sha }}" > ../_site/deployment-sha.txt
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: _site/
          retention-days: 1

  # Job 3: Deploy to gh-pages branch
  deploy-gh-pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: https://www.bws.ninja
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: _site/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy ${{ github.sha }} to GitHub Pages"
          cname: www.bws.ninja

  # Job 4: Post-deployment smoke tests
  validate-deployment:
    runs-on: ubuntu-latest
    needs: deploy-gh-pages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against production
        id: smoke-test
        working-directory: tests
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: "https://www.bws.ninja"
          NO_WEBSERVER: "true"
        run: |
          # Run smoke tests (will output to test-results.json due to CI env)
          set -o pipefail
          npx playwright test smoke/ --config=playwright.config.cjs --project=chromium 2>&1 | tee smoke-test-output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "SMOKE_TESTS_FAILED=true" >> $GITHUB_ENV
            echo "⚠️ Production smoke tests failed"
          else
            echo "✅ Production smoke tests passed"
          fi

      - name: Check deployment health
        run: |
          echo "Checking production site health..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://www.bws.ninja/ || echo "000")
          echo "Homepage status: $response"
          [ "$response" = "200" ] || [ "$response" = "000" ] || exit 0
