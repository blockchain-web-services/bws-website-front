name: Build, Test, and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Run test suite
  test:
    runs-on: ubuntu-latest
    env:
      SINGLE_ISSUE_MODE: true  # Enable single-issue mode by default
    strategy:
      matrix:
        browser: [chromium]
    name: Test - ${{ matrix.browser }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        id: test-run
        env:
          PORT: 4321
          PLAYWRIGHT_BASE_URL: http://localhost:4321
        run: |
          # Run tests with reporters configured in playwright.config.cjs
          # In CI, this will use JSON reporter outputting to test-results.json
          # Use set -o pipefail to preserve exit code through pipe
          # Add --max-failures=1 to stop on first failure (saves CI time)
          set -o pipefail

          # Check if we're in single-issue mode
          if [ "${{ env.SINGLE_ISSUE_MODE }}" = "true" ]; then
            echo "Running tests with --max-failures=1 (stop on first failure)"
            npx playwright test --config=tests/playwright.config.cjs --project=${{ matrix.browser }} --max-failures=1 2>&1 | tee test-output.txt
          else
            echo "Running all tests"
            npx playwright test --config=tests/playwright.config.cjs --project=${{ matrix.browser }} 2>&1 | tee test-output.txt
          fi

          # Debug: Find where the JSON output was created
          echo "Looking for test-results.json files..."
          find . -name "test-results.json" -type f 2>/dev/null || true
          find . -name "*.json" -path "*/test-results/*" -type f 2>/dev/null || true

          # Copy JSON results to expected location
          if [ -f "tests/test-results.json" ]; then
            cp tests/test-results.json test-results.json
          elif [ -f "test-results.json" ]; then
            echo "JSON results already in correct location"
          else
            echo "Warning: No test-results.json found"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            tests/test-results/
            tests/test-results.json
            tests/test-output.txt
            test-results.json
            test-output.txt
          retention-days: 30

      - name: Download job logs
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW }}
          script: |
            const fs = require('fs');

            // Get failed jobs
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

            const failedJobs = jobs.data.jobs.filter(job => job.conclusion === 'failure');
            console.log(`Found ${failedJobs.length} failed job(s)`);

            // Download logs for each failed job
            for (const job of failedJobs) {
              try {
                console.log(`Downloading logs for job: ${job.name}`);
                const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id
                });

                // Save job logs to file
                const fileName = `job-logs-${job.name.replace(/[^a-z0-9]/gi, '-')}.txt`;
                fs.writeFileSync(fileName, logs.data.substring(0, 50000)); // Limit to 50KB
                console.log(`Saved logs to ${fileName}`);
              } catch (error) {
                console.log(`Failed to download logs for ${job.name}: ${error.message}`);
              }
            }

      - name: Collect and format test errors
        if: failure()
        env:
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          SINGLE_ISSUE_MODE: true
        run: |
          echo "Collecting test errors..."

          # Debug: Check what files exist
          echo "Files in current directory:"
          ls -la test-*.* 2>/dev/null || true
          ls -la job-logs-*.txt 2>/dev/null || true
          echo "Files in tests directory:"
          ls -la tests/test-*.* 2>/dev/null || true

          # Find the JSON results file
          JSON_FILE=""
          if [ -f "test-results.json" ]; then
            JSON_FILE="test-results.json"
          elif [ -f "tests/test-results.json" ]; then
            JSON_FILE="tests/test-results.json"
          else
            echo "No JSON results found, creating placeholder"
            echo '{"stats": {"total": 0, "failed": 0}, "errors": []}' > test-results.json
            JSON_FILE="test-results.json"
          fi

          echo "Using JSON file: $JSON_FILE"
          echo "Contents of JSON file:"
          cat "$JSON_FILE" | head -50 || echo "File not found"

          # Combine job logs if they exist
          if ls job-logs-*.txt 1> /dev/null 2>&1; then
            echo "Combining job logs..."
            cat job-logs-*.txt > combined-job-logs.txt 2>/dev/null || true
          fi

          # Run error collector with job logs
          if [ -f "combined-job-logs.txt" ]; then
            node scripts/collect-test-errors.js "$JSON_FILE" test-output.txt issue-content.md combined-job-logs.txt || echo "Error collection failed"
          else
            node scripts/collect-test-errors.js "$JSON_FILE" test-output.txt issue-content.md || echo "Error collection failed"
          fi

      - name: Create GitHub Issue for failures
        if: failure() && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read the issue content
            let issueBody;
            try {
              issueBody = fs.readFileSync('issue-content.md', 'utf8');
            } catch (error) {
              console.log('No issue content file found, using default');
              issueBody = `## Test Failure Report\n\nTests failed in workflow run: [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\nPlease check the workflow logs for details.`;
            }

            // Add PR context to issue if available
            const prContext = context.payload.pull_request ?
              `\n\n### Pull Request Context\n- PR: #${context.payload.pull_request.number}\n- Title: ${context.payload.pull_request.title}\n- Author: @${context.payload.pull_request.user.login}` : '';

            if (prContext) {
              issueBody = issueBody.replace('### Failure Context', '### Failure Context' + prContext);
            }

            // Check if similar issue already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['test-failure', 'automated'],
              state: 'open'
            });

            const today = new Date().toISOString().split('T')[0];
            const runNumber = context.runNumber || 'unknown';

            // Check if we already have an issue for this exact run
            const existingForRun = existingIssues.data.find(issue =>
              issue.title.includes(`Run #${runNumber}`) && issue.title.includes(today)
            );

            if (existingForRun) {
              console.log(`Issue #${existingForRun.number} already exists for Run #${runNumber}, skipping duplicate creation`);
              return;
            }

            // Check for recent Claude fix attempts to prevent infinite loops
            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            const recentClaudeFixIssues = existingIssues.data.filter(issue =>
              issue.body && issue.body.includes('claude-fix-ci') &&
              issue.created_at > oneDayAgo
            );

            // Check if this push is from a Claude fix
            const commitMessage = context.payload.head_commit?.message || '';
            const isClaudeFix = commitMessage.includes('Generated with Claude Code') ||
                               commitMessage.includes('Co-Authored-By: Claude');

            const maxClaudeAttempts = 10;
            const claudeAttemptCount = recentClaudeFixIssues.length;

            // If Claude has already tried multiple times, don't trigger again
            if (isClaudeFix && claudeAttemptCount >= maxClaudeAttempts) {
              console.log(`Claude has attempted ${claudeAttemptCount} fixes in the last 24 hours. Manual intervention required.`);

              // Modify issue body to NOT mention @claude
              issueBody = issueBody.replace('@claude - Please fix these test failures using the command below.',
                                          '⚠️ **MANUAL FIX REQUIRED** - Claude auto-fix limit reached (10 attempts in 24h).');
              issueBody = issueBody.replace('**Claude Fix Attempt:** 1 of 10',
                                          `**Claude Fix Attempt:** ${claudeAttemptCount + 1} of ${maxClaudeAttempts} (LIMIT EXCEEDED)`);
            }

            // Always create a new issue for each failed run (no more comments on existing issues)
            // This prevents Claude from being triggered multiple times for different failures
            // Create new issue
            // Create issue with enhanced title including run number for uniqueness
              // Single test mode - create focused issue title
              const issueTitle = context.payload.pull_request ?
                `🎯 Fix Single Test - PR #${context.payload.pull_request.number} - Run #${runNumber}` :
                `🎯 Fix Single Test - Run #${runNumber} - ${today}`;

              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['single-test', 'automated', 'claude-fix', 'focused']
              });
              console.log(`Created issue #${issue.data.number}`);

              // Try to assign to claude (will silently fail if user doesn't exist)
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.data.number,
                  assignees: ['claude']
                });
              } catch (assignError) {
                console.log('Could not assign to claude:', assignError.message);
              }

  # Job 2: Build for production
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: |
          npm run build
          echo "${{ github.sha }}" > _site/deployment-sha.txt
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: _site/
          retention-days: 1

  # Job 3: Deploy to gh-pages branch
  deploy-gh-pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: https://www.bws.ninja
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: _site/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ github.sha }} to GitHub Pages'
          cname: www.bws.ninja

  # Job 4: Post-deployment smoke tests
  validate-deployment:
    runs-on: ubuntu-latest
    needs: deploy-gh-pages
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against production
        id: smoke-test
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: "https://www.bws.ninja"
          NO_WEBSERVER: "true"
        run: |
          # Run smoke tests (will output to test-results.json due to CI env)
          set -o pipefail
          npx playwright test tests/smoke/ --config=tests/playwright.config.cjs --project=chromium 2>&1 | tee smoke-test-output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}

          # Find and rename JSON output for smoke tests
          if [ -f "test-results.json" ]; then
            mv test-results.json smoke-test-results.json
          elif [ -f "tests/test-results.json" ]; then
            mv tests/test-results.json smoke-test-results.json
          else
            echo "No JSON results found for smoke tests"
            echo '{"stats": {"total": 0, "failed": 0}}' > smoke-test-results.json
          fi

          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "SMOKE_TESTS_FAILED=true" >> $GITHUB_ENV
            echo "⚠️ Production smoke tests failed"
          fi

      - name: Check deployment health
        run: |
          echo "Checking production site health..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://www.bws.ninja/ || echo "000")
          echo "Homepage status: $response"
          [ "$response" = "200" ] || [ "$response" = "000" ] || exit 0

      - name: Collect smoke test errors
        if: env.SMOKE_TESTS_FAILED == 'true'
        run: |
          echo "Collecting smoke test errors..."

          # Debug output
          echo "Smoke test files:"
          ls -la smoke-* 2>/dev/null || true

          # Ensure we have the JSON file
          if [ ! -f "smoke-test-results.json" ]; then
            echo "Creating placeholder JSON for smoke tests"
            echo '{"stats": {"total": 0, "failed": 0}}' > smoke-test-results.json
          fi

          node scripts/collect-test-errors.js smoke-test-results.json smoke-test-output.txt smoke-issue-content.md

      - name: Create Issue for production failures
        if: env.SMOKE_TESTS_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REPOS_AND_WORKFLOW }}
          script: |
            const fs = require('fs');

            // Read the issue content
            let issueBody;
            try {
              issueBody = fs.readFileSync('smoke-issue-content.md', 'utf8');
            } catch (error) {
              issueBody = `## Production Smoke Test Failure\n\nSmoke tests failed against production: https://www.bws.ninja\n\nWorkflow: [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            }

            // Create high-priority issue for production failures
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `😨 PRODUCTION FAILURE - Smoke Tests - ${new Date().toISOString().split('T')[0]}`,
              body: issueBody,
              labels: ['test-failure', 'production', 'automated', 'critical']
            });

            console.log(`Created critical production issue #${issue.data.number}`);

            // Try to assign to claude
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.data.number,
                assignees: ['claude']
              });
            } catch (error) {
              console.log('Could not assign to claude');
            }