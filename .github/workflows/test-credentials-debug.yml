name: Credentials Debug Test Suite

on:
  workflow_dispatch:
    inputs:
      run_phase_1:
        description: 'Phase 1: Auth test'
        type: boolean
        default: true
      run_phase_2:
        description: 'Phase 2: Read test'
        type: boolean
        default: true
      run_phase_3:
        description: 'Phase 3: Write test'
        type: boolean
        default: true
      run_phase_4:
        description: 'Phase 4: Proxy comparison'
        type: boolean
        default: true
      run_phase_5:
        description: 'Phase 5: Secret hashes'
        type: boolean
        default: true
      run_phase_6:
        description: 'Phase 6: Account status'
        type: boolean
        default: true

jobs:
  phase-1-auth:
    name: Phase 1 - Minimal Authentication
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: ${{ github.event.inputs.run_phase_1 == 'true' || github.event.inputs.run_phase_1 == null }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 1 - Authentication Test
        run: node scripts/test-minimal-auth.js
        env:
          BWSXAI_TWITTER_API_KEY: ${{ secrets.BWSXAI_TWITTER_API_KEY }}
          BWSXAI_TWITTER_API_SECRET: ${{ secrets.BWSXAI_TWITTER_API_SECRET }}
          BWSXAI_TWITTER_ACCESS_TOKEN: ${{ secrets.BWSXAI_TWITTER_ACCESS_TOKEN }}
          BWSXAI_TWITTER_ACCESS_SECRET: ${{ secrets.BWSXAI_TWITTER_ACCESS_SECRET }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          CI: true
          GITHUB_ACTIONS: true

  phase-2-read:
    name: Phase 2 - Minimal Read Operation
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: phase-1-auth
    if: ${{ github.event.inputs.run_phase_2 == 'true' || github.event.inputs.run_phase_2 == null }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 2 - Read Test
        run: node scripts/test-minimal-read.js
        env:
          BWSXAI_TWITTER_API_KEY: ${{ secrets.BWSXAI_TWITTER_API_KEY }}
          BWSXAI_TWITTER_API_SECRET: ${{ secrets.BWSXAI_TWITTER_API_SECRET }}
          BWSXAI_TWITTER_ACCESS_TOKEN: ${{ secrets.BWSXAI_TWITTER_ACCESS_TOKEN }}
          BWSXAI_TWITTER_ACCESS_SECRET: ${{ secrets.BWSXAI_TWITTER_ACCESS_SECRET }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          CI: true
          GITHUB_ACTIONS: true

  phase-3-write:
    name: Phase 3 - Minimal Write Operation (CRITICAL)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: phase-2-read
    if: ${{ github.event.inputs.run_phase_3 == 'true' || github.event.inputs.run_phase_3 == null }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 3 - Write Test (Post + Delete)
        run: node scripts/test-minimal-write.js
        env:
          BWSXAI_TWITTER_API_KEY: ${{ secrets.BWSXAI_TWITTER_API_KEY }}
          BWSXAI_TWITTER_API_SECRET: ${{ secrets.BWSXAI_TWITTER_API_SECRET }}
          BWSXAI_TWITTER_ACCESS_TOKEN: ${{ secrets.BWSXAI_TWITTER_ACCESS_TOKEN }}
          BWSXAI_TWITTER_ACCESS_SECRET: ${{ secrets.BWSXAI_TWITTER_ACCESS_SECRET }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          CI: true
          GITHUB_ACTIONS: true

  phase-4-proxy:
    name: Phase 4 - Proxy Isolation Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: phase-3-write
    if: ${{ github.event.inputs.run_phase_4 == 'true' || github.event.inputs.run_phase_4 == null }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 4 - Proxy Comparison
        run: node scripts/test-with-without-proxy.js
        env:
          BWSXAI_TWITTER_API_KEY: ${{ secrets.BWSXAI_TWITTER_API_KEY }}
          BWSXAI_TWITTER_API_SECRET: ${{ secrets.BWSXAI_TWITTER_API_SECRET }}
          BWSXAI_TWITTER_ACCESS_TOKEN: ${{ secrets.BWSXAI_TWITTER_ACCESS_TOKEN }}
          BWSXAI_TWITTER_ACCESS_SECRET: ${{ secrets.BWSXAI_TWITTER_ACCESS_SECRET }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          CI: true
          GITHUB_ACTIONS: true

  phase-5-secrets:
    name: Phase 5 - Secret Values Verification
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: ${{ github.event.inputs.run_phase_5 == 'true' || github.event.inputs.run_phase_5 == null }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 5 - Secret Hashes
        run: node scripts/test-secret-values.js
        env:
          BWSXAI_TWITTER_API_KEY: ${{ secrets.BWSXAI_TWITTER_API_KEY }}
          BWSXAI_TWITTER_API_SECRET: ${{ secrets.BWSXAI_TWITTER_API_SECRET }}
          BWSXAI_TWITTER_ACCESS_TOKEN: ${{ secrets.BWSXAI_TWITTER_ACCESS_TOKEN }}
          BWSXAI_TWITTER_ACCESS_SECRET: ${{ secrets.BWSXAI_TWITTER_ACCESS_SECRET }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          CI: true
          GITHUB_ACTIONS: true

  phase-6-account:
    name: Phase 6 - Account Status Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: phase-3-write
    if: ${{ github.event.inputs.run_phase_6 == 'true' || github.event.inputs.run_phase_6 == null }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 6 - Account Status
        run: node scripts/test-account-status.js
        env:
          BWSXAI_TWITTER_API_KEY: ${{ secrets.BWSXAI_TWITTER_API_KEY }}
          BWSXAI_TWITTER_API_SECRET: ${{ secrets.BWSXAI_TWITTER_API_SECRET }}
          BWSXAI_TWITTER_ACCESS_TOKEN: ${{ secrets.BWSXAI_TWITTER_ACCESS_TOKEN }}
          BWSXAI_TWITTER_ACCESS_SECRET: ${{ secrets.BWSXAI_TWITTER_ACCESS_SECRET }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          CI: true
          GITHUB_ACTIONS: true

  summary:
    name: Test Suite Summary
    runs-on: ubuntu-latest
    needs: [phase-1-auth, phase-2-read, phase-3-write, phase-4-proxy, phase-5-secrets, phase-6-account]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# 🔍 Credentials Debug Test Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Phases" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Phase | Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Authentication (client.v2.me) | ${{ needs.phase-1-auth.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Read Operation (timeline) | ${{ needs.phase-2-read.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | **Write Operation (post+delete)** | **${{ needs.phase-3-write.result }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | Proxy Comparison | ${{ needs.phase-4-proxy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 | Secret Hashes | ${{ needs.phase-5-secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 6 | Account Status | ${{ needs.phase-6-account.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.phase-3-write.result }}" == "success" ]; then
            echo "✅ **CRITICAL:** Phase 3 (Write) passed - posting works in CI!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "If workflows still fail with 403, the issue is likely:" >> $GITHUB_STEP_SUMMARY
            echo "- Specific to reply operations (not regular tweets)" >> $GITHUB_STEP_SUMMARY
            echo "- Related to tweet interactions (like/follow before reply)" >> $GITHUB_STEP_SUMMARY
            echo "- Content filtering or spam detection" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **CRITICAL:** Phase 3 (Write) failed - posting NOT working in CI" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check Phase 3 logs for error code (403, 401, etc.)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Review individual phase logs for detailed error messages" >> $GITHUB_STEP_SUMMARY
          echo "2. Compare Phase 5 secret hashes with local run" >> $GITHUB_STEP_SUMMARY
          echo "3. If Phase 4 shows proxy issues, consider testing workflows without proxy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*This is an incremental diagnostic workflow to isolate 403 errors*" >> $GITHUB_STEP_SUMMARY
