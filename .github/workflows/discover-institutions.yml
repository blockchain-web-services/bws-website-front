name: Discover Institution Accounts

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 8:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"

concurrency:
  group: data-commit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Discover institution accounts
        id: discover
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          node scripts/crawling/production/discover-institution-accounts-sdk.js
          echo "discover_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet scripts/crawling/data/institution-accounts.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No new institutions discovered"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ New institutions discovered"
          fi

      - name: Get stats
        if: steps.discover.outputs.discover_status == 'success'
        id: stats
        run: |
          if [ -f "scripts/crawling/data/institution-accounts.json" ]; then
            TOTAL_INSTITUTIONS=$(jq '.stats.totalDiscovered' scripts/crawling/data/institution-accounts.json)
            DISCOVERY_RUNS=$(jq '.metadata.discoveryRuns' scripts/crawling/data/institution-accounts.json)

            echo "total_institutions=$TOTAL_INSTITUTIONS" >> $GITHUB_OUTPUT
            echo "discovery_runs=$DISCOVERY_RUNS" >> $GITHUB_OUTPUT
          else
            echo "total_institutions=0" >> $GITHUB_OUTPUT
            echo "discovery_runs=0" >> $GITHUB_OUTPUT
          fi

      - name: Commit institution data
        if: steps.changes.outputs.has_changes == 'true' && steps.discover.outputs.discover_status == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest changes to avoid push conflicts
          git pull origin ${{ github.ref_name }} --rebase

          git add scripts/crawling/data/institution-accounts.json
          git commit -m "Update institution accounts database

          Discovery run #${{ steps.stats.outputs.discovery_runs }}
          Total institutions: ${{ steps.stats.outputs.total_institutions }}

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>"
          git push

      - name: Create summary
        if: steps.discover.outputs.discover_status == 'success'
        run: |
          echo "## 🏫 Institution Discovery Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Institutions:** ${{ steps.stats.outputs.total_institutions }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Discovery Run:** #${{ steps.stats.outputs.discovery_runs }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New Data Committed:** ${{ steps.changes.outputs.has_changes == 'true' && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  handle-failure:
    needs: discover
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date();
            const timestamp = now.toISOString();

            const issueBody = `## Institution Discovery Failure

            The institution account discovery workflow failed.

            - **Workflow Run:** [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Timestamp:** ${timestamp}

            ### Possible Causes

            1. **Twitter API Issues:**
               - Rate limit exceeded
               - Invalid/expired credentials
               - API endpoint changes

            2. **Script Issues:**
               - Account classification errors
               - Product fit scoring errors
               - Database update errors

            ### Action Required

            1. Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            2. Verify Twitter API credentials in repository secrets
            3. Check institution-accounts.json for corruption
            4. Test script manually if needed:
               \`\`\`bash
               node scripts/crawling/production/discover-institution-accounts-sdk.js
               \`\`\`

            ---
            *Automated report from Institution Discovery workflow*`;

            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Institution Discovery Failure - ${now.toISOString().split('T')[0]}`,
                body: issueBody,
                labels: ['automated', 'institution-discovery', 'bug']
              });
              console.log(`Created issue #${issue.data.number}`);
            } catch (error) {
              console.error('Failed to create issue:', error.message);
            }
