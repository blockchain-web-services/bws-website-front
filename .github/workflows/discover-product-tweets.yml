name: Discover Product Tweets

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8:00 AM UTC
  workflow_dispatch:
    inputs:
      product:
        description: 'Specific product to discover (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - 'Blockchain Badges'
          - 'BWS IPFS'
          - 'NFT.zK'
          - 'Blockchain Hash'

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Discover product tweets
        id: discover
        env:
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.product }}" ]; then
            echo "Discovering tweets for: ${{ github.event.inputs.product }}"
            node scripts/crawling/production/discover-product-tweets.js --product="${{ github.event.inputs.product }}"
          else
            echo "Discovering tweets for all products"
            node scripts/crawling/production/discover-product-tweets.js
          fi
          echo "discover_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet scripts/crawling/data/product-discovery-queue.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected"
          fi

      - name: Commit queue updates
        if: steps.changes.outputs.has_changes == 'true' && steps.discover.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/crawling/data/product-discovery-queue.json
          git commit -m "Update product discovery queue

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push

      - name: Summary
        if: steps.discover.outcome == 'success'
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Successfully discovered and queued new product tweets"
          else
            echo "ℹ️  No new product tweets found"
          fi

  handle-failure:
    needs: discover
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date();
            const timestamp = now.toISOString();

            const issueBody = `## Product Tweet Discovery Failure

            The product tweet discovery workflow failed.

            - **Workflow Run:** [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Timestamp:** ${timestamp}
            - **Product:** ${{ github.event.inputs.product || 'All products' }}

            ### Possible Causes

            1. **Oxylabs Issues:**
               - Proxy credentials expired
               - Rate limit exceeded
               - Connection timeout

            2. **Twitter/X Issues:**
               - Search queries blocked
               - Platform changes

            3. **Script Issues:**
               - Parse error in tweet data
               - File write permission issues

            ### Action Required

            1. Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            2. Verify Oxylabs credentials
            3. Test script manually if needed

            ---
            *Automated report from Product Tweet Discovery workflow*`;

            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Product Tweet Discovery Failure - ${now.toISOString().split('T')[0]}`,
                body: issueBody,
                labels: ['automated', 'product-discovery', 'bug']
              });
              console.log(`Created issue #${issue.data.number}`);
            } catch (error) {
              console.error('Failed to create issue:', error.message);
            }
