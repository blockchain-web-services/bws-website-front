name: Generate Articles from X Posts

on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10:00 AM UTC (1 hour after partnerships fetch)
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  NODE_VERSION: "20"

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install project dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Install dependencies for article generator
        run: npm install twitter-api-v2 @anthropic-ai/sdk

      - name: Generate articles from X posts
        id: generate
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/generate-articles.js
          echo "generate_status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet \
            src/data/articles.ts \
            src/data/successStories.ts \
            src/pages/articles/ \
            src/components/articles/ \
            public/assets/images/articles/ \
            scripts/data/processed-article-tweets.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected"
          fi

      - name: Build site to verify
        if: steps.changes.outputs.has_changes == 'true' && steps.generate.outcome == 'success'
        run: npx astro build

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true' && steps.generate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            src/data/articles.ts \
            src/data/successStories.ts \
            src/pages/articles/ \
            src/components/articles/ \
            public/assets/images/articles/ \
            scripts/data/processed-article-tweets.json
          git commit -m "Generate articles from X posts

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push

      - name: Summary
        if: steps.generate.outcome == 'success'
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Successfully generated new articles"
          else
            echo "ℹ️  No new articles generated"
          fi

  # Job 2: Handle failures - create fix branch and PR
  handle-failure:
    needs: generate-articles
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create fix branch and PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Generate timestamp (DD-MM-HH format)
            const now = new Date();
            const dd = String(now.getUTCDate()).padStart(2, '0');
            const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
            const hh = String(now.getUTCHours()).padStart(2, '0');
            const timestamp = `${dd}-${mm}-${hh}`;
            const fullTimestamp = now.toISOString().replace(/[:.]/g, '-').substring(0, 19);
            const shortSha = context.sha.substring(0, 7);

            // Create branch name
            const branchName = `fix/article-generation-failure-${fullTimestamp}-${shortSha}`;
            console.log(`Creating fix branch: ${branchName}`);

            // Configure git
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');

            // Create and checkout new branch
            execSync(`git checkout -b ${branchName}`);

            // Create fixes directory structure
            const fixesDir = `fixes/${branchName.replace(/\//g, '-')}`;
            execSync(`mkdir -p ${fixesDir}`);

            // Create failure report
            const issueContent = [
              '# Article Generation Failure Report',
              '',
              `**Generated:** ${now.toISOString()}`,
              `**Workflow Run:** [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              `**Commit:** ${context.sha}`,
              `**Branch:** ${context.ref.replace('refs/heads/', '')}`,
              '',
              '## Issue Description',
              '',
              'The daily article generation workflow failed.',
              '',
              '## Possible Causes',
              '',
              '1. **Twitter API Issues:**',
              '   - Rate limit exceeded',
              '   - Invalid/expired bearer token',
              '   - API endpoint changes',
              '   - User @BWSCommunity not found or suspended',
              '',
              '2. **Anthropic API Issues:**',
              '   - Rate limit exceeded',
              '   - Invalid/expired API key',
              '   - Model errors or timeouts',
              '   - JSON parsing errors from Claude response',
              '',
              '3. **Network Issues:**',
              '   - Connection timeout',
              '   - DNS resolution failure',
              '   - Firewall blocking API access',
              '',
              '4. **Script Issues:**',
              '   - Parse error in tweet content',
              '   - Image download failure',
              '   - File write permission issues',
              '   - articles.ts or successStories.ts format changed',
              '   - Product classification errors',
              '   - Article page generation errors',
              '',
              '## Action Required',
              '',
              `1. Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              '2. Verify TWITTER_BEARER_TOKEN secret is valid',
              '3. Verify ANTHROPIC_API_KEY secret is valid',
              '4. Test script manually: `node scripts/generate-articles.js`',
              '5. Fix the issue and push to this branch',
              '',
              '---',
              '*This is an automated report from the article generation workflow.*'
            ].join('\n');

            fs.writeFileSync(`${fixesDir}/FAILURE_REPORT.md`, issueContent);

            // Commit and push
            execSync(`git add ${fixesDir}`);
            execSync(`git commit -m "Add article generation failure report\n\nFailure detected in workflow run ${{ github.run_id }}"`);
            execSync(`git push -u origin ${branchName}`);

            console.log('Branch created and pushed successfully');

            // Create pull request
            try {
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔧 Fix: Article generation failure - ${timestamp}`,
                head: branchName,
                base: context.ref.replace('refs/heads/', ''),
                body: `## 🔴 Article Generation Failure\n\nAutomated fix branch created due to article generation workflow failure.\n\n### 📋 Details\n- **Failed Workflow:** [Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n- **Failed Commit:** ${context.sha}\n- **Branch:** \`${branchName}\`\n- **Failure Report:** [FAILURE_REPORT.md](https://github.com/${{ github.repository }}/blob/${branchName}/${fixesDir}/FAILURE_REPORT.md)\n- **Timestamp:** ${now.toISOString()}\n\n### 🔄 Workflow\n1. Review failure report and workflow logs\n2. Investigate root cause (Twitter API, Anthropic API, or script issues)\n3. Fix the issue (update tokens, fix script bugs, etc.)\n4. Push fixes to this branch\n5. Workflow will re-run automatically\n6. PR will auto-merge when workflow succeeds ✅\n\n### 🤖 Auto-Merge\nThis PR is configured to auto-merge once the workflow passes.\n\n---\n*Generated by GitHub Actions*`,
                draft: false
              });

              console.log(`Created PR #${pr.data.number}`);

              // Add labels
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.data.number,
                labels: ['automated', 'article-generation', 'needs-fix']
              });

              console.log('Labels added to PR');

            } catch (error) {
              console.error('Failed to create PR:', error.message);
            }

            // Create issue for tracking
            const issueBody = `## Article Generation Failure\n\nThe daily article generation workflow failed.\n\n- **Fix Branch:** \`${branchName}\`\n- **Pull Request:** Created automatically\n- **Workflow Run:** [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n- **Timestamp:** ${now.toISOString()}\n\n### Action Required\nReview the failure report in the PR and fix the issue.\n\nThe workflow will retry daily at 10 AM UTC automatically.\n\n### Quick Checks\n- [ ] Verify TWITTER_BEARER_TOKEN is valid\n- [ ] Verify ANTHROPIC_API_KEY is valid\n- [ ] Check Twitter API status\n- [ ] Check Anthropic API status\n- [ ] Review workflow logs for errors\n- [ ] Test script locally`;

            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Article Generation Failure - ${timestamp}`,
                body: issueBody,
                labels: ['article-generation', 'automated', 'bug']
              });
              console.log(`Created issue #${issue.data.number}`);
            } catch (error) {
              console.error('Failed to create issue:', error.message);
            }
