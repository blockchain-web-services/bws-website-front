<!DOCTYPE html>
<html>
<head>
    <title>Image Serving Test</title>
</head>
<body>
    <h1>Image Serving Test</h1>

    <h2>AssureDefi Image Test</h2>
    <img src="/assets/images/6474d385cfec71cb21a92251/6707f1c5c0856eff6c22300e_AssureDefi.png"
         style="max-width: 200px; border: 1px solid red;"
         onerror="this.style.border='3px solid red'; this.innerHTML='FAILED TO LOAD';"
         onload="this.style.border='3px solid green';"
         alt="AssureDefi Logo">

    <h2>Tokenomics Image Test</h2>
    <img src="/assets/images/6474d385cfec71cb21a92251/6707fd987c3a05d42e1e908e_Tokenomics%20Allocation-letters-black.png"
         style="max-width: 200px; border: 1px solid red;"
         onerror="this.style.border='3px solid red';"
         onload="this.style.border='3px solid green';"
         alt="Tokenomics">

    <h2>BFG Image Test</h2>
    <img src="/assets/images/6474d385cfec71cb21a92251/64e738258afae2bb6f4d56bf_logo-blockchain-founders-group-background-transparent-large.svg"
         style="max-width: 200px; border: 1px solid red;"
         onerror="this.style.border='3px solid red';"
         onload="this.style.border='3px solid green';"
         alt="BFG Logo">

    <script>
        console.log('Test page loaded');
        setTimeout(function() {
            const images = document.querySelectorAll('img');
            images.forEach((img, index) => {
                console.log(`Image ${index + 1}:`, {
                    src: img.src,
                    naturalWidth: img.naturalWidth,
                    naturalHeight: img.naturalHeight,
                    complete: img.complete
                });
            });
        }, 2000);
    </script>
</body>
</html>
